        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconClipboard = ({ width = "14", height = "14" }) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconVideo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>;
        const IconTicket = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>;
        const IconServer = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>;
        const IconCloudUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="22"/><line x1="15" y1="22" x2="15" y2="22"/><line x1="12" y1="22" x2="12" y2="22"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="4" y1="16" x2="20" y2="16"/></svg>;

        const SoftcomLogo = ({ size = "45" }) => (
            <div className="flex items-center gap-2 transform scale-75 origin-left md:scale-100 transition-transform">
                <svg width={size} height={(size * 35)/45} viewBox="0 0 45 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 8C4 6.89543 4.89543 6 6 6H16.5L19.5 9H39C40.1046 9 41 9.89543 41 11V13H4V8Z" fill="#EAB308" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                    <path d="M2 12C2 10.8954 2.89543 10 4 10H41C42.1046 10 43 10.8954 43 12V28C43 29.1046 42.1046 30 41 30H4C2.89543 30 2 29.1046 2 28V12Z" fill="#FBCC14" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                </svg>
                <span className="text-3xl font-black italic tracking-tighter text-white select-none softcom-italic" style={{ letterSpacing: '-0.08em' }}>
                    softcom
                </span>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('verificacao');
            const [menuOpen, setMenuOpen] = useState(false);
            const [mappedErrors, setMappedErrors] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedError, setSelectedError] = useState(null);
            const [editingError, setEditingError] = useState(null);
            const [loading, setLoading] = useState(false);
            
            const [errorInput, setErrorInput] = useState('');
            const [solutionInput, setSolutionInput] = useState('');
            const [videoInput, setVideoInput] = useState('');
            
            const [saveStatus, setSaveStatus] = useState(null);
            const [copyStatus, setCopyStatus] = useState({});
            
            const [editErrorInput, setEditErrorInput] = useState('');
            const [editSolutionInput, setEditSolutionInput] = useState('');
            const [editVideoInput, setEditVideoInput] = useState('');
            
            const [isEspecialistaAuthed, setIsEspecialistaAuthed] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [ticketStatus, setTicketStatus] = useState(null); // null, 'loading', 'success', 'error'
            
            const [municipios, setMunicipios] = useState([]);
            const [searchMun, setSearchMun] = useState('');
            const [loadingMun, setLoadingMun] = useState(false);
            const [filtroAderentes, setFiltroAderentes] = useState(false);
            const [filtroUF, setFiltroUF] = useState('');
            const [stats, setStats] = useState({ total: 0, aderentes: 0, naoAderentes: 0 });
            const [animStats, setAnimStats] = useState({ total: 0, aderentes: 0, naoAderentes: 0, pct: 0 });
            
            // Estados para Autocomplete
            const [sugestoes, setSugestoes] = useState([]);
            const [loadingSugestoes, setLoadingSugestoes] = useState(false);
            const [mostrarSugestoes, setMostrarSugestoes] = useState(false);
            const [selectedIndex, setSelectedIndex] = useState(-1);
            
            // Novos estados para carga CSV local
            const [municipiosTemp, setMunicipiosTemp] = useState([]);
            const [filtroMunicipio, setFiltroMunicipio] = useState('');
            const [syncStatus, setSyncStatus] = useState(null); // null, 'loading', 'success', 'error'
            
            // Estado do Formulário de Ticket
            const [ticketData, setTicketData] = useState({
                empresa: '', cnpj: '', municipio: '', ambiente: '', erro: '', descricao: '', ticketAntigo: '', acoes: ''
            });
            const [finalMessage, setFinalMessage] = useState('');

            const linksUteis = [
                { title: "Portal Invoicy", url: "https://web.invoicy.com.br/", description: "Verificação técnica detalhada." },
                { title: "Dashboard Ambientes", url: "https://painel-dfe-production-382497636524.us-central1.run.app/", description: "Monitor de ambientes municipais." },
                { title: "Atendimento Migrate", url: "https://atendimento.migrate.com.br/Account/Login", description: "Suporte técnico externo." },
                { title: "Municípios Aderentes", url: "https://docs.google.com/spreadsheets/d/1n81k8BaNEDzAmqRJkYgK1q2OseDVIukbGQklLR9ABCI/edit?usp=sharing", description: "Habilitação ambiente nacional." },
                { title: "Serviços NBS", url: "https://view.officeapps.live.com/op/view.aspx?src=https%3A%2F%2Fwww.gov.br%2Fnfse%2Fpt-br%2Fbiblioteca%2Fdocumentacao-tecnica%2Fdocumentacao-atual%2Fanexo_b-nbs2-lista_servico_nacional-snnfse-v1-01-20260122.xlsx", description: "Lista oficial de serviços nacionais." }
            ];

            const credenciais = [
                { portal: "Invoicy", user: "renato.rodrigues@softcomtecnologia.com.br", pass: "Softcom12" },
                { portal: "Migrate", user: "suporte.nfse.softcom@gmail.com", pass: "Sfc@3321" }
            ];

            const listaUFs = ['AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'];

            const fetchErrors = async () => {
                setLoading(true);
                const { data } = await supabase.from('mapped_errors').select('*').order('created_at', { ascending: false });
                if (data) setMappedErrors(data);
                setLoading(false);
            };

            useEffect(() => { fetchErrors(); }, []);

            const openEditModal = (item) => {
                setEditErrorInput(item.erro);
                setEditSolutionInput(item.solucao);
                setEditVideoInput(item.video_url || '');
                setEditingError(item);
            };

            const handleUpdateError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').update({ 
                    erro: editErrorInput, 
                    solucao: editSolutionInput,
                    video_url: editVideoInput
                }).eq('id', editingError.id);
                
                if (error) setSaveStatus('error');
                else {
                    setSaveStatus('success');
                    fetchErrors();
                    setTimeout(() => {
                        setSaveStatus(null);
                        setEditingError(null);
                        if(selectedError && selectedError.id === editingError.id) {
                            setSelectedError({...selectedError, erro: editErrorInput, solucao: editSolutionInput, video_url: editVideoInput});
                        }
                    }, 1000);
                }
            };

            const handleSaveError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').insert([{ 
                    erro: errorInput, 
                    solucao: solutionInput,
                    video_url: videoInput
                }]);
                if (error) setSaveStatus('error');
                else {
                    setSaveStatus('success');
                    setErrorInput(''); setSolutionInput(''); setVideoInput('');
                    fetchErrors();
                    setTimeout(() => { setSaveStatus(null); setView('erros_mapeados'); }, 1500);
                }
            };

            const deleteError = async (id) => {
                if (!confirm("Remover permanentemente esta solução?")) return;
                await supabase.from('mapped_errors').delete().eq('id', id);
                fetchErrors();
            };

            const fetchMunicipios = async (termo = '') => {
                setLoadingMun(true);
                try {
                    let query = supabase.from('municipios').select('*');

                    if (filtroAderentes) {
                        query.eq('AderenteAmbienteNacional', 'Sim').eq('AderenteEmissorNacional', 'Sim');
                    }

                    if (filtroUF) {
                        query.eq('UF', filtroUF);
                    }

                    if (termo) {
                        query = query.ilike('NomeMunicipio', `%${termo}%`);
                    }
                    const { data, error } = await query.order('UF').order('NomeMunicipio').limit(50);
                    
                    if (error) {
                        console.error("Erro Supabase:", error);
                        setMunicipios([]);
                    } else if (data) {
                        console.log("Dados recebidos:", data);
                        setMunicipios(data);
                    }
                } catch (e) { console.error("Exceção:", e); }
                setLoadingMun(false);
            };

            // Efeito para Autocomplete (Sugestões enquanto digita)
            useEffect(() => {
                // Só busca se tiver 2 ou mais caracteres e se a lista de sugestões não estiver visível (evita loop ao clicar)
                // Mas precisamos permitir refinar, então o click vai desligar o mostrarSugestoes
                if (searchMun.length < 2) {
                    setSugestoes([]);
                    setMostrarSugestoes(false);
                    return;
                }

                setLoadingSugestoes(true);
                const timer = setTimeout(async () => {
                    // Busca Inteligente: Procura no Nome OU na UF
                    const { data } = await supabase.from('municipios')
                        .select('NomeMunicipio, UF')
                        .or(`NomeMunicipio.ilike.%${searchMun}%,UF.ilike.%${searchMun}%`)
                        .limit(5);
                    
                    setLoadingSugestoes(false);
                    
                    if (data) {
                        setSugestoes(data);
                        setMostrarSugestoes(true);
                        setSelectedIndex(-1); // Reseta seleção ao digitar
                    } else {
                        setMostrarSugestoes(false);
                    }
                }, 300); // Delay de 300ms para não pesar o banco

                return () => clearTimeout(timer);
            }, [searchMun]);

            // Função para destacar o texto pesquisado
            const highlightMatch = (text, query) => {
                if (!query) return text;
                const parts = text.split(new RegExp(`(${query})`, 'gi'));
                return parts.map((part, index) => 
                    part.toLowerCase() === query.toLowerCase() ? <span key={index} className="text-[#f59e0b] bg-[#f59e0b]/10 rounded px-0.5">{part}</span> : part
                );
            };

            const handleKeyDown = (e) => {
                if (!mostrarSugestoes || sugestoes.length === 0) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setSelectedIndex(prev => (prev < sugestoes.length - 1 ? prev + 1 : prev));
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setSelectedIndex(prev => (prev > 0 ? prev - 1 : -1));
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    e.preventDefault();
                    const selecionado = sugestoes[selectedIndex];
                    setSearchMun(getVal(selecionado, 'NomeMunicipio'));
                    setMostrarSugestoes(false);
                    fetchMunicipios(getVal(selecionado, 'NomeMunicipio'));
                } else if (e.key === 'Escape') {
                    setMostrarSugestoes(false);
                }
            };

            const fetchStats = async () => {
                try {
                    // 1. Consulta Total (considerando filtro UF)
                    let queryTotal = supabase.from('municipios').select('*', { count: 'exact', head: true });
                    if (filtroUF) queryTotal = queryTotal.eq('UF', filtroUF);
                    
                    const { count: total, error: errTotal } = await queryTotal;
                    
                    // 2. Consulta Aderentes (considerando filtro UF)
                    let queryAderentes = supabase.from('municipios').select('*', { count: 'exact', head: true })
                        .eq('AderenteAmbienteNacional', 'Sim')
                        .eq('AderenteEmissorNacional', 'Sim');
                    
                    if (filtroUF) queryAderentes = queryAderentes.eq('UF', filtroUF);
                        
                    let { count: aderentes, error: errAderentes } = await queryAderentes;
                        
                    // Fallback para colunas em minúsculo se falhar a primeira tentativa
                    if (errAderentes) {
                        let queryLow = supabase.from('municipios').select('*', { count: 'exact', head: true })
                            .eq('aderenteambientenacional', 'Sim')
                            .eq('aderenteemissornacional', 'Sim');
                            
                        if (filtroUF) queryLow = queryLow.eq('uf', filtroUF);

                        const { count: aderentesLow } = await queryLow;
                        if (aderentesLow !== null) aderentes = aderentesLow;
                    }

                    if (total !== null && aderentes !== null) {
                        setStats({ total, aderentes, naoAderentes: total - aderentes });
                    }
                } catch (e) { console.error("Erro stats:", e); }
            };

            const filteredErrors = useMemo(() => {
                if (!searchQuery) return mappedErrors;
                const q = searchQuery.toLowerCase();
                return mappedErrors.filter(e => e.erro.toLowerCase().includes(q) || e.solucao.toLowerCase().includes(q));
            }, [mappedErrors, searchQuery]);

            const copyToClipboard = (text, key) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(prev => ({ ...prev, [key]: true }));
                setTimeout(() => setCopyStatus(prev => ({ ...prev, [key]: false })), 2000);
            };

            // Atualiza a mensagem final quando os dados do formulário mudam
            useEffect(() => {
                const texto = `Assunto: ${ticketData.erro.split('\n')[0] || 'Erro na Emissão'} - ${ticketData.empresa || 'CLIENTE'}\n
Bom dia,\n
Encaminhamos este chamado referente a uma falha na emissão de notas no ambiente ${ticketData.ambiente || '...'}.\n
**Dados do Emitente:**
* Empresa: ${ticketData.empresa || '...'}
* CNPJ: ${ticketData.cnpj || '...'}
* Município: ${ticketData.municipio || '...'}\n
**Descrição:**
O sistema retorna a mensagem: **${ticketData.erro || '...'}**.
${ticketData.descricao || ''}\n
Ações Realizadas: ${ticketData.acoes || 'Verificação de cadastro e schemas.'}
${ticketData.ticketAntigo ? 'Ticket Anterior: ' + ticketData.ticketAntigo : ''}\n
Não foi possível resolver internamente.`;
                setFinalMessage(texto);
            }, [ticketData]);

            const handleGerarTicket = async () => {
                const textoParaEnviar = finalMessage;

                if (!textoParaEnviar.trim()) {
                    alert("O campo de texto está vazio!");
                    return;
                }

                setTicketStatus('loading');
                try {
                    // Exemplo: 'https://seulink.ngrok-free.app/abrir_migrate'
                    const response = await fetch('http://localhost:5000/abrir_migrate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            empresa: ticketData.empresa || "GARAGE", 
                            conteudo: textoParaEnviar
                        })
                    });
                    const result = await response.json();
                    setTicketStatus('success');
                    alert(result.message || "Automação finalizada!");
                } catch (error) {
                    setTicketStatus('error');
                    alert("Erro ao conectar com o servidor Python.");
                    console.error(error);
                } finally {
                    setTimeout(() => setTicketStatus(null), 3000);
                }
            };

            useEffect(() => {
                if (view === 'verificacao') {
                    fetchMunicipios(searchMun);
                    fetchStats();
                }
            }, [view, filtroAderentes, filtroUF]); // Carrega ao entrar na aba ou ao mudar o filtro

            // Efeito de Animação para o Gráfico e Números
            useEffect(() => {
                if (stats.total === 0) return;
                
                let start = null;
                const duration = 2000; // 2 segundos de animação
                
                const animate = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 4); // EaseOutQuart (suave no final)
                    
                    setAnimStats({
                        total: Math.floor(stats.total * ease),
                        aderentes: Math.floor(stats.aderentes * ease),
                        naoAderentes: Math.floor(stats.naoAderentes * ease),
                        pct: (stats.aderentes / stats.total) * ease
                    });
                    
                    if (progress < 1) requestAnimationFrame(animate);
                };
                
                requestAnimationFrame(animate);
            }, [stats]);

            const handleSyncDatabase = async () => {
                if (municipiosTemp.length === 0) return alert("Carregue um CSV primeiro.");
                if (!confirm(`Deseja enviar ${municipiosTemp.length} registros para o banco de dados? Isso atualizará os dados existentes.`)) return;

                setSyncStatus('loading');
                try {
                    const response = await fetch('http://localhost:5000/sincronizar_municipios', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ municipios: municipiosTemp })
                    });
                    const result = await response.json();
                    if (response.ok) { setSyncStatus('success'); alert(result.message); }
                    else { throw new Error(result.error); }
                } catch (error) { setSyncStatus('error'); alert("Erro na sincronização: " + error.message); }
                finally { setSyncStatus(null); }
            };

            // Função auxiliar para ler dados ignorando maiúsculas/minúsculas
            const getVal = (obj, key) => {
                if (!obj) return '';
                // Tenta encontrar a chave exata ou em minúsculo
                return obj[key] || obj[key.toLowerCase()] || obj[key.toUpperCase()] || '';
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 font-sans antialiased">
                    <header className="bg-[#2d3e50] text-white shadow-lg p-4 px-6 flex items-center justify-between border-b-4 border-[#f59e0b] sticky top-0 z-[60]">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                                {menuOpen ? <IconX /> : <IconMenu />}
                            </button>
                            <SoftcomLogo />
                        </div>
                    </header>

                    <div className={`fixed inset-y-0 left-0 w-64 bg-[#2d3e50] shadow-2xl z-50 transform transition-transform duration-300 ease-in-out border-r border-slate-700 pt-24 ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-4 flex flex-col gap-2">
                            <button onClick={() => { setView('verificacao'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'verificacao' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconServer /> VERIFICAÇÃO AMBIENTE
                            </button>
                            <button onClick={() => { setView('erros_mapeados'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'erros_mapeados' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconSearch /> BASE DE SOLUÇÕES
                            </button>
                            <button onClick={() => { setView('gerar_ticket'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'gerar_ticket' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconTicket /> GERAR TICKET
                            </button>
                            <button onClick={() => { setView('mapear_erro'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'mapear_erro' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconPlus /> MAPEAR ERRO
                            </button>
                            <button onClick={() => { setView('links'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'links' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconExternalLink /> LINKS ÚTEIS
                            </button>
                            <div className="my-2 border-t border-slate-700"></div>
                            <button onClick={() => { setView('especialista'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'especialista' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconShield /> SETOR ESPECIALISTA
                            </button>
                        </nav>
                    </div>

                    {menuOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40" onClick={() => setMenuOpen(false)}></div>}

                    <main className="max-w-6xl mx-auto w-full p-4 md:p-8 flex-1 flex flex-col">
                        
                        {view === 'erros_mapeados' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Base de Soluções</h2>
                                    </div>
                                    <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Pesquisar..." className="w-full max-w-md px-6 py-4 bg-white border-2 border-slate-200 rounded-2xl outline-none focus:border-[#f59e0b] font-bold shadow-sm" />
                                </div>
                                {loading ? (
                                    <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-[#f59e0b] border-t-transparent rounded-full animate-spin"></div></div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredErrors.map((item) => (
                                            <div key={item.id} className="bg-white rounded-[2.5rem] shadow-md border-2 border-transparent hover:border-[#f59e0b] transition-all p-6 flex flex-col group h-full cursor-pointer" onClick={() => setSelectedError(item)}>
                                                <div className="flex justify-between mb-4">
                                                    <div className="bg-slate-50 p-2.5 rounded-xl text-[#2d3e50] group-hover:bg-[#f59e0b]/10 group-hover:text-[#f59e0b] transition-colors"><IconFileText /></div>
                                                    <div className="flex gap-2 items-center">
                                                        {item.video_url && <div className="text-emerald-500 bg-emerald-50 p-1.5 rounded-lg"><IconVideo /></div>}
                                                        <button onClick={(e) => { e.stopPropagation(); openEditModal(item); }} className="text-slate-400 hover:text-[#f59e0b] p-2 bg-slate-50 rounded-lg transition-all"><IconEdit /></button>
                                                        <button onClick={(e) => { e.stopPropagation(); deleteError(item.id); }} className="text-slate-400 hover:text-red-500 p-2 bg-slate-50 rounded-lg transition-all"><IconTrash /></button>
                                                    </div>
                                                </div>
                                                <h3 className="text-[#2d3e50] font-black uppercase text-xs italic tracking-tight mb-4 line-clamp-3 border-l-4 border-slate-100 group-hover:border-[#f59e0b] pl-3 leading-tight transition-all">
                                                    {item.erro}
                                                </h3>
                                                <div className="mt-auto pt-4 border-t text-[10px] font-black text-[#f59e0b] uppercase tracking-widest flex items-center justify-between">
                                                    <span>Ler Solução Técnica</span>
                                                    <IconArrowRight />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}


                        {view === 'verificacao' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Consultar Municípios</h2>
                                            <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">{filtroUF ? `Panorama - ${filtroUF}` : 'Base de Dados Nacional'}</p>
                                        </div>
                                    </div>

                                    <form onSubmit={(e) => { e.preventDefault(); setMostrarSugestoes(false); fetchMunicipios(searchMun); }} className="flex gap-4 w-full md:w-auto relative">
                                        <div className="relative w-full md:w-80">
                                            <input 
                                                type="text" 
                                                value={searchMun}
                                                onChange={(e) => setSearchMun(e.target.value)}
                                                onKeyDown={handleKeyDown}
                                                onFocus={() => { if(searchMun.length >= 2) setMostrarSugestoes(true); }}
                                                // Delay no blur para dar tempo de clicar na lista
                                                onBlur={() => setTimeout(() => setMostrarSugestoes(false), 200)}
                                                placeholder="Pesquisar cidade..." 
                                                className="w-full pl-6 pr-10 py-3 rounded-xl border border-slate-200 text-sm font-bold outline-none focus:border-[#f59e0b] text-slate-700 shadow-sm transition-all"
                                                autoComplete="off"
                                            />
                                            
                                            {/* Ícone de Loading ou Limpar */}
                                            {loadingSugestoes ? (
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                                    <div className="w-4 h-4 border-2 border-slate-300 border-t-[#f59e0b] rounded-full animate-spin"></div>
                                                </div>
                                            ) : searchMun && (
                                                <button 
                                                    type="button"
                                                    onClick={() => { setSearchMun(''); setSugestoes([]); setMostrarSugestoes(false); }}
                                                    className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-red-400 p-1 transition-colors"
                                                >
                                                    <IconX />
                                                </button>
                                            )}
                                            
                                            {/* Lista de Sugestões (Autocomplete) */}
                                            {mostrarSugestoes && (
                                                <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 overflow-hidden animate-fadeIn">
                                                    {sugestoes.length > 0 ? (
                                                        <>
                                                            <div className="bg-slate-50 px-5 py-3 border-b border-slate-100 flex items-center justify-between">
                                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sugestões Encontradas</span>
                                                            </div>
                                                            {sugestoes.map((sug, idx) => (
                                                                <div 
                                                                    key={idx}
                                                                    onClick={() => { setSearchMun(getVal(sug, 'NomeMunicipio')); setMostrarSugestoes(false); fetchMunicipios(getVal(sug, 'NomeMunicipio')); }}
                                                                    className={`group px-5 py-3 cursor-pointer border-b border-slate-50 last:border-0 flex justify-between items-center transition-all duration-100 ${idx === selectedIndex ? 'bg-amber-50 border-amber-100' : 'hover:bg-slate-50'}`}
                                                                >
                                                                    <div className="flex items-center gap-3">
                                                                        <div className={`p-2 rounded-lg transition-all shadow-sm ${idx === selectedIndex ? 'bg-[#f59e0b] text-white' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'}`}><IconBuilding /></div>
                                                                        <span className={`text-sm font-black ${idx === selectedIndex ? 'text-[#2d3e50]' : 'text-slate-600'}`}>
                                                                            {highlightMatch(getVal(sug, 'NomeMunicipio'), searchMun)}
                                                                        </span>
                                                                    </div>
                                                                    <span className={`text-[10px] font-black px-2 py-1 rounded-lg transition-colors uppercase tracking-widest ${idx === selectedIndex ? 'bg-[#f59e0b]/10 text-[#f59e0b]' : 'bg-slate-100 text-slate-400'}`}>{getVal(sug, 'UF')}</span>
                                                                </div>
                                                            ))}
                                                        </>
                                                    ) : (
                                                        <div className="p-6 text-center">
                                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-wide">Nenhuma cidade encontrada</p>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        <button type="submit" className="bg-[#2d3e50] text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 transition-all shadow-lg">
                                            Buscar
                                        </button>
                                    </form>
                                </div>

                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-around gap-10">
                                    {/* Gráfico Donut SVG */}
                                    <div className="relative w-48 h-48 flex-shrink-0">
                                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                            <defs>
                                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                                    <stop offset="0%" style={{stopColor: "#34d399", stopOpacity: 1}} />
                                                    <stop offset="100%" style={{stopColor: "#10b981", stopOpacity: 1}} />
                                                </linearGradient>
                                            </defs>
                                            <circle cx="50" cy="50" r="40" stroke="#f1f5f9" strokeWidth="10" fill="transparent" />
                                            <circle cx="50" cy="50" r="40" stroke="url(#grad1)" strokeWidth="10" fill="transparent" 
                                                strokeDasharray={2 * Math.PI * 40} 
                                                strokeDashoffset={(2 * Math.PI * 40) - (animStats.pct * (2 * Math.PI * 40))} 
                                                strokeLinecap="round" 
                                            />
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-4xl font-black text-slate-700">{animStats.total}</span>
                                            <span className="text-[10px] font-bold uppercase text-slate-400 tracking-widest">{filtroUF ? `Total ${filtroUF}` : 'Nacional'}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full md:w-auto">
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center shadow-sm"><IconCheck /></div>
                                            <div>
                                                <div className="text-3xl font-black text-slate-700">{animStats.aderentes}</div>
                                                <div className="text-[10px] font-bold uppercase text-slate-400 tracking-widest">100% Aderentes</div>
                                                <div className="text-[10px] font-bold text-emerald-500">{(animStats.pct * 100).toFixed(1)}% do total</div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center shadow-sm"><IconServer /></div>
                                            <div>
                                                <div className="text-3xl font-black text-slate-700">{animStats.naoAderentes}</div>
                                                <div className="text-[10px] font-bold uppercase text-slate-400 tracking-widest">Pendentes</div>
                                                <div className="text-[10px] font-bold text-slate-400">{(100 - (animStats.pct * 100)).toFixed(1)}% do total</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Filtros:</span>
                                    
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Estado:</span>
                                        <select 
                                            value={filtroUF} 
                                            onChange={(e) => setFiltroUF(e.target.value)}
                                            className="bg-slate-50 border border-slate-200 text-slate-700 text-sm font-bold rounded-lg p-2 px-3 outline-none focus:border-[#f59e0b] cursor-pointer hover:bg-slate-100 transition-colors"
                                        >
                                            <option value="">Todos</option>
                                            {listaUFs.map(uf => <option key={uf} value={uf}>{uf}</option>)}
                                        </select>
                                    </div>

                                    <label className="flex items-center gap-3 cursor-pointer select-none">
                                        <input 
                                            type="checkbox" 
                                            checked={filtroAderentes} 
                                            onChange={(e) => setFiltroAderentes(e.target.checked)}
                                            className="h-5 w-5 rounded border-slate-300 text-[#f59e0b] focus:ring-2 focus:ring-[#f59e0b]/50 shadow"
                                        />
                                        <span className="text-sm font-bold text-slate-700">Apenas 100% Aderentes (Ambiente + Emissor)</span>
                                    </label>
                                </div>

                                {loadingMun ? (
                                    <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-[#f59e0b] border-t-transparent rounded-full animate-spin"></div></div>
                                ) : municipios.length > 0 ? (
                                    <div className="bg-white rounded-[2.5rem] shadow-md border-2 border-slate-100 overflow-hidden">
                                        <div className="overflow-x-auto overflow-y-auto max-h-[600px] custom-scrollbar">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="sticky top-0 z-10 bg-slate-50 shadow-sm">
                                                    <tr className="border-b-2 border-slate-100 bg-slate-50">
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Região</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">UF</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Município</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">CNPJ</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Status Convênio</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Aderente Amb. Nac.</th>
                                                        <th className="p-4 px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right whitespace-nowrap">Aderente Emissor</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {municipios.map((mun, idx) => (
                                                        <tr key={idx} className="hover:bg-amber-50/30 transition-colors">
                                                            <td className="p-4 px-6 font-bold text-slate-500 text-xs whitespace-nowrap">{getVal(mun, 'Regiao')}</td>
                                                            <td className="p-4 px-6 font-black text-[#2d3e50] whitespace-nowrap">{getVal(mun, 'UF')}</td>
                                                            <td className="p-4 px-6 font-bold text-slate-600 text-sm whitespace-nowrap">{getVal(mun, 'NomeMunicipio')}</td>
                                                            <td className="p-4 px-6 font-mono text-xs text-slate-500 whitespace-nowrap">{getVal(mun, 'CNPJ')}</td>
                                                            <td className="p-4 px-6 whitespace-nowrap">
                                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase whitespace-nowrap ${getVal(mun, 'StatusConvenioSEFIN') === 'Ativo' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                                                                    {getVal(mun, 'StatusConvenioSEFIN')}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 px-6 whitespace-nowrap">
                                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase whitespace-nowrap ${getVal(mun, 'AderenteAmbienteNacional') === 'Sim' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {getVal(mun, 'AderenteAmbienteNacional')}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 px-6 text-right whitespace-nowrap">
                                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase whitespace-nowrap ${getVal(mun, 'AderenteEmissorNacional') === 'Sim' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                                    {getVal(mun, 'AderenteEmissorNacional')}
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                        <div className="p-4 bg-slate-50 border-t flex justify-between items-center px-8">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                Mostrando {municipios.length} registros
                                            </p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-[2.5rem] shadow-md border-2 border-slate-100 p-20 flex flex-col items-center justify-center text-center">
                                        <div className="bg-slate-50 p-6 rounded-full text-slate-200 mb-6">
                                            <IconServer />
                                        </div>
                                        <h3 className="text-slate-400 font-black uppercase text-sm tracking-widest">Nenhum município encontrado</h3>
                                        <p className="text-slate-400 text-xs mt-2 max-w-md italic">
                                            Utilize o campo de pesquisa acima para consultar a base de dados.
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'gerar_ticket' && (
                            <div className="animate-fadeIn w-full h-full flex flex-col gap-6">
                                <div className="flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconEdit /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Automação de Ticket</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
                                    {/* Coluna Esquerda: Formulário */}
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-md border border-slate-200 flex flex-col gap-4 overflow-y-auto custom-scrollbar">
                                        <h3 className="text-[#2d3e50] font-black uppercase text-xs tracking-widest mb-2">Dados do Cliente</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input type="text" placeholder="Empresa / Razão Social" value={ticketData.empresa} onChange={e => setTicketData({...ticketData, empresa: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                            <input type="text" placeholder="CNPJ" value={ticketData.cnpj} onChange={e => setTicketData({...ticketData, cnpj: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input type="text" placeholder="Município/UF" value={ticketData.municipio} onChange={e => setTicketData({...ticketData, municipio: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                            <input type="text" placeholder="Ambiente (Ex: 2.03)" value={ticketData.ambiente} onChange={e => setTicketData({...ticketData, ambiente: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                        </div>
                                        
                                        <h3 className="text-[#2d3e50] font-black uppercase text-xs tracking-widest mt-2 mb-2">Detalhes do Erro</h3>
                                        <textarea rows="2" placeholder="Mensagem de Erro (Título)" value={ticketData.erro} onChange={e => setTicketData({...ticketData, erro: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm resize-none"></textarea>
                                        <textarea rows="3" placeholder="Descrição detalhada do problema..." value={ticketData.descricao} onChange={e => setTicketData({...ticketData, descricao: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm resize-none"></textarea>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input type="text" placeholder="Ações Realizadas" value={ticketData.acoes} onChange={e => setTicketData({...ticketData, acoes: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                            <input type="text" placeholder="Ticket Antigo (Opcional)" value={ticketData.ticketAntigo} onChange={e => setTicketData({...ticketData, ticketAntigo: e.target.value})} className="bg-slate-50 p-3 rounded-xl border border-slate-100 focus:border-[#f59e0b] outline-none font-bold text-slate-700 text-sm" />
                                        </div>
                                        
                                        <button onClick={() => setTicketData({empresa: '', cnpj: '', municipio: '', ambiente: '', erro: '', descricao: '', ticketAntigo: '', acoes: ''})} className="mt-auto py-3 bg-slate-100 text-slate-400 font-bold rounded-xl uppercase text-[10px] tracking-widest hover:bg-slate-200 transition-colors">Limpar Formulário</button>
                                    </div>
                                    
                                    {/* Coluna Direita: Preview e Ação */}
                                    <div className="flex flex-col bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                                        <div className="bg-[#2d3e50] p-4 px-6 flex justify-between items-center">
                                            <span className="text-white text-[10px] font-black uppercase tracking-widest">Pré-visualização da Mensagem</span>
                                            <span className="text-orange-400 text-[10px] font-bold uppercase">Editável</span>
                                        </div>
                                        
                                        <textarea 
                                            value={finalMessage} 
                                            onChange={(e) => setFinalMessage(e.target.value)}
                                            className="flex-1 p-6 font-mono text-sm whitespace-pre-wrap text-slate-600 outline-none focus:bg-slate-50 transition-colors resize-none"
                                        ></textarea>
                                    
                                        <div className="p-6 bg-slate-50 border-t border-slate-100">
                                            <button onClick={handleGerarTicket} disabled={ticketStatus === 'loading'} className={`w-full py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg transition-all flex items-center justify-center gap-3 ${ticketStatus === 'loading' ? 'bg-slate-300 text-slate-500 cursor-wait' : 'bg-[#2d3e50] text-white hover:bg-slate-800'}`}>
                                                {ticketStatus === 'loading' ? (
                                                    <>
                                                        <div className="w-4 h-4 border-2 border-slate-500 border-t-transparent rounded-full animate-spin"></div>
                                                        PROCESSANDO AUTOMAÇÃO...
                                                    </>
                                                ) : (
                                                    <>
                                                        <IconTicket /> GERAR TEXTO E ABRIR TICKET
                                                    </>
                                                )}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'mapear_erro' && (
                            <div className="animate-fadeIn max-w-2xl mx-auto w-full">
                                <div className="mb-8 flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconPlus /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Mapear Novo Erro</h2>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 md:p-10">
                                    <form onSubmit={handleSaveError} className="space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 leading-none tracking-widest">Título / Mensagem de Erro</label>
                                            <textarea required rows="2" value={errorInput} onChange={(e) => setErrorInput(e.target.value)} placeholder="Ex: Rejeição 203..." className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold text-slate-700" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 leading-none tracking-widest">Solução Detalhada</label>
                                            <textarea required rows="6" value={solutionInput} onChange={(e) => setSolutionInput(e.target.value)} placeholder="Passo a passo..." className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold text-slate-700" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 leading-none tracking-widest italic">Link do Vídeo (Azure/URL)</label>
                                            <div className="relative">
                                                <input value={videoInput} onChange={(e) => setVideoInput(e.target.value)} placeholder="https://..." className="w-full p-5 pl-14 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold text-slate-700" />
                                                <div className="absolute left-5 top-5 text-slate-300"><IconVideo /></div>
                                            </div>
                                        </div>
                                        <button type="submit" disabled={saveStatus === 'loading'} className="w-full bg-[#2d3e50] text-white font-black py-6 rounded-2xl hover:bg-slate-800 transition-all uppercase tracking-widest shadow-xl">
                                            {saveStatus === 'loading' ? 'A PROCESSAR...' : 'GRAVAR NA CLOUD'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {view === 'links' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconExternalLink /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Links & Portais Úteis</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {linksUteis.map((link, idx) => (
                                        <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="bg-white p-6 rounded-3xl shadow-md border-2 border-transparent hover:border-[#f59e0b] transition-all group flex flex-col justify-between h-48">
                                            <div>
                                                <div className="flex justify-between mb-4">
                                                    <div className="text-slate-400 group-hover:text-[#f59e0b] transition-colors"><IconExternalLink /></div>
                                                    <IconArrowRight />
                                                </div>
                                                <h3 className="text-[#2d3e50] font-black uppercase italic tracking-tighter mb-2 leading-none">{link.title}</h3>
                                                <p className="text-slate-500 text-xs font-bold leading-tight line-clamp-2">{link.description}</p>
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'especialista' && (
                            <div className="animate-fadeIn flex justify-center w-full">
                                {!isEspecialistaAuthed ? (
                                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-200 w-full max-w-sm text-center">
                                        <div className="mb-8 flex justify-center"><div className="bg-slate-50 p-10 rounded-full text-[#f59e0b] shadow-inner"><IconShield /></div></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter mb-10 leading-none">Acesso Especialista</h2>
                                        <input type="password" maxLength="4" value={pinInput} onChange={(e) => { setPinInput(e.target.value); if(e.target.value === '7711') setIsEspecialistaAuthed(true); }} placeholder="PIN" className="w-full text-center text-3xl md:text-5xl p-6 bg-slate-50 border-2 rounded-2xl outline-none border-slate-200 focus:border-[#f59e0b] tracking-[0.4em] font-black" autoFocus />
                                    </div>
                                ) : (
                                    <div className="w-full space-y-10 animate-fadeIn">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-emerald-500 p-3 rounded-2xl text-white shadow-lg"><IconShield /></div>
                                            <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none tracking-tighter">Credenciais Master</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {credenciais.map((c, i) => (
                                                <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-xl border-t-[10px] border-[#f59e0b] flex flex-col gap-6">
                                                    <h3 className="text-slate-800 font-black uppercase italic tracking-tighter text-2xl mb-2">{c.portal}</h3>
                                                    <div className="space-y-5">
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-1 leading-none">Login</p>
                                                            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                                                                <span className="font-bold text-slate-600 truncate mr-4">{c.user}</span>
                                                                <button onClick={() => copyToClipboard(c.user, `u_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`u_${i}`] ? 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-1 leading-none">Password</p>
                                                            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                                                                <span className="font-mono font-bold text-slate-600">••••••••</span>
                                                                <button onClick={() => copyToClipboard(c.pass, `p_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`p_${i}`] ? 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* --- MODAL DETALHES COM PLAYER --- */}
                    {selectedError && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4 animate-fadeIn" onClick={() => setSelectedError(null)}>
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] flex flex-col relative animate-modalIn" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedError(null)} className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-100 text-slate-400 transition-all"><IconX /></button>
                                
                                <div className="p-6 md:p-10 pb-4">
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="w-2 h-2 rounded-full bg-[#f59e0b]"></div>
                                        <span className="text-[#f59e0b] font-black uppercase text-[10px] tracking-widest">Solução Catalogada</span>
                                    </div>
                                    <h2 className="text-2xl font-black text-[#2d3e50] uppercase italic tracking-tighter leading-tight">{selectedError.erro}</h2>
                                </div>

                                <div className="px-6 md:px-10 overflow-y-auto custom-scrollbar flex-1 space-y-6 pb-6">
                                    {selectedError.video_url && (
                                        <div className="space-y-3">
                                            <span className="text-[10px] font-black uppercase text-emerald-500 flex items-center gap-2 tracking-widest">
                                                <IconVideo /> Explicação em Vídeo
                                            </span>
                                            <div className="aspect-video bg-black rounded-3xl overflow-hidden shadow-xl border border-slate-100">
                                                <video controls playsInline preload="metadata" className="w-full h-full">
                                                    <source src={selectedError.video_url} type="video/mp4" />
                                                    Navegador incompatível.
                                                </video>
                                            </div>
                                        </div>
                                    )}
                                    <div className="bg-slate-50 rounded-[2rem] p-6 md:p-8 border border-slate-100">
                                        <p className="text-slate-700 whitespace-pre-wrap font-bold text-lg leading-relaxed">{selectedError.solucao}</p>
                                    </div>
                                </div>

                                <div className="p-6 md:p-10 pt-0 flex gap-4">
                                    <button onClick={() => openEditModal(selectedError)} className="p-5 rounded-2xl bg-slate-100 text-slate-400 hover:text-[#f59e0b] transition-all"><IconEdit /></button>
                                    <button onClick={() => copyToClipboard(selectedError.solucao, `m_${selectedError.id}`)} className={`flex-1 p-5 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 transition-all ${copyStatus[`m_${selectedError.id}`] ? 'bg-emerald-500 text-white' : 'bg-[#2d3e50] text-white hover:bg-slate-800'}`}>
                                        <IconClipboard size={18} /> {copyStatus[`m_${selectedError.id}`] ? "COPIADO!" : "COPIAR RESOLUÇÃO"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL EDIÇÃO COM CAMPO VÍDEO --- */}
                    {editingError && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-xl animate-fadeIn">
                            <div className="bg-white w-full max-w-2xl mx-4 rounded-[3rem] shadow-2xl overflow-hidden animate-modalIn" onClick={e => e.stopPropagation()}>
                                <div className="bg-[#2d3e50] p-8 border-b-4 border-[#f59e0b] flex justify-between items-center text-white">
                                    <h3 className="text-xl font-black italic uppercase tracking-tighter leading-none">Editar Mapeamento</h3>
                                    <button onClick={() => setEditingError(null)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><IconX /></button>
                                </div>
                                <form onSubmit={handleUpdateError} className="p-6 md:p-10 space-y-6 bg-slate-50">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Erro</label>
                                        <textarea required rows="2" value={editErrorInput} onChange={(e) => setEditErrorInput(e.target.value)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Solução</label>
                                        <textarea required rows="6" value={editSolutionInput} onChange={(e) => setEditSolutionInput(e.target.value)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Link Vídeo (Azure)</label>
                                        <input value={editVideoInput} onChange={(e) => setEditVideoInput(e.target.value)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setEditingError(null)} className="flex-1 py-5 bg-slate-200 text-slate-600 font-black rounded-2xl uppercase text-xs tracking-widest transition-colors hover:bg-slate-300">Descartar</button>
                                        <button type="submit" className="flex-[2] py-5 bg-[#f59e0b] text-[#2d3e50] font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl transition-all">
                                            {saveStatus === 'loading' ? 'A GRAVAR...' : 'SALVAR ALTERAÇÕES'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="text-center p-8 text-slate-400 text-[10px] font-black uppercase italic tracking-widest leading-none tracking-tighter opacity-50">
                        Softcom Tecnologia &copy; {new Date().getFullYear()} • Suporte NFSe Cloud
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
