<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softcom - Assistente NFSe</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .softcom-italic { font-style: italic; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d3e50; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        #root { min-height: 100vh; }
        
        .bg-softcom-blue { background-color: #2d3e50; }
        .text-softcom-blue { color: #2d3e50; }
        .border-softcom-yellow { border-color: #f59e0b; }
        .bg-softcom-yellow { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-[#2d3e50]">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-t-[#f59e0b] border-slate-600 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-white font-bold italic tracking-tighter uppercase text-xs">A ligar ao Supabase Softcom...</p>
            </div>
        </div>
    </div>

    <script type="text/babel" data-presets="react" data-type="module">
        // Importação do Cliente Supabase via CDN
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const { useState, useEffect, useMemo } = React;

        // Configurações Supabase (Dados fornecidos)
        const SUPABASE_URL = 'https://jlmqkrqesfmfrjkawwtf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsbXFrcnFlc2ZtZnJqa2F3d3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MzU4OTgsImV4cCI6MjA4ODIxMTg5OH0.wKERk4oDm7XJhGoq1TnsMJ1IK8hbHefJXJdCb1XKsLE';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- Ícones em SVG ---
        const IconHelp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconClipboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        
        // Ícones em falta
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

        const SoftcomLogo = ({ size = "45" }) => (
            <div className="flex items-center gap-2">
                <svg width={size} height={(size * 35)/45} viewBox="0 0 45 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 8C4 6.89543 4.89543 6 6 6H16.5L19.5 9H39C40.1046 9 41 9.89543 41 11V13H4V8Z" fill="#EAB308" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                    <path d="M2 12C2 10.8954 2.89543 10 4 10H41C42.1046 10 43 10.8954 43 12V28C43 29.1046 42.1046 30 41 30H4C2.89543 30 2 29.1046 2 28V12Z" fill="#FBCC14" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                </svg>
                <span className="text-3xl font-black italic tracking-tighter text-white select-none softcom-italic" style={{ letterSpacing: '-0.08em' }}>
                    softcom
                </span>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('analise');
            const [menuOpen, setMenuOpen] = useState(false);
            
            // Fluxograma State
            const [currentStep, setCurrentStep] = useState('inicio');
            const [flowHistory, setFlowHistory] = useState([]);

            // Base de Erros State (Supabase)
            const [mappedErrors, setMappedErrors] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedError, setSelectedError] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // Formulários
            const [errorInput, setErrorInput] = useState('');
            const [solutionInput, setSolutionInput] = useState('');
            const [saveStatus, setSaveStatus] = useState(null);
            const [copyStatus, setCopyStatus] = useState({});

            // Ticket Migrate State
            const [ticketForm, setTicketForm] = useState({ empresa: '', cnpj: '', erro: '' });
            const [generatedText, setGeneratedText] = useState('');

            // Autenticação Especialista
            const [isEspecialistaAuthed, setIsEspecialistaAuthed] = useState(false);
            const [pinInput, setPinInput] = useState('');

            const flowchart = {
                inicio: {
                    question: "O cliente já emite NFS-e pelo sistema?",
                    options: [
                        { label: "Sim", next: "cliente_desktop_web" },
                        { label: "Não", next: "solicitar_xml_pdf" }
                    ]
                },
                solicitar_xml_pdf: {
                    instruction: "Peça ao cliente o XML de uma nota teste e o PDF emitido este ano na prefeitura.",
                    question: "Arquivos recebidos?",
                    options: [
                        { label: "Sim", next: "comparar_dados" },
                        { label: "Não", next: "solicitar_xml_pdf" }
                    ]
                },
                comparar_dados: {
                    instruction: "Compare os dados da nota do sistema com a nota teste e deixe os dados do serviço iguais.",
                    question: "O ajuste resolveu o problema?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "cliente_desktop_web" }
                    ]
                },
                cliente_desktop_web: {
                    question: "Qual o ambiente do cliente?",
                    options: [
                        { label: "Desktop", next: "subindo_migrate" },
                        { label: "Web", next: "subindo_migrate" }
                    ]
                },
                subindo_migrate: {
                    question: "A nota está a subir para o monitor da Migrate?",
                    options: [
                        { label: "Sim", next: "foi_autorizada" },
                        { label: "Não", next: "verificar_versao_emissor" }
                    ]
                },
                foi_autorizada: {
                    question: "A nota foi autorizada na prefeitura?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não (Rejeitada)", next: "verificar_erro_exibe" }
                    ]
                },
                verificar_erro_exibe: {
                    instruction: "Analise o erro exibido no monitor da Migrate. Utilize o GPT, Google ou a aba 'Erros Mapeados'.",
                    question: "Conseguiu resolver com o ajuste técnico?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "abrir_ticket_migrate" }
                    ]
                },
                abrir_ticket_migrate: {
                    instruction: "Abra um ticket com a Migrate relatando o incidente.",
                    isEnd: true,
                    type: "action",
                    title: "Fim - Abrir Ticket"
                },
                verificar_versao_emissor: {
                    instruction: "Verifique a versão do emissor de notas e valide se está atualizado.",
                    question: "Versão verificada?",
                    options: [
                        { label: "Sim, Próximo", next: "refazer_pedido_zero" }
                    ]
                },
                refazer_pedido_zero: {
                    instruction: "Refaça o pedido do zero no sistema e tente emitir a nota novamente.",
                    question: "Resolveu o problema?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "versao_inferior_910" }
                    ]
                },
                versao_inferior_910: {
                    question: "A versão do sistema é inferior a 9.10?",
                    options: [
                        { label: "Sim", next: "passar_atualizador" },
                        { label: "Não", next: "reconfigurar_emissor_zero" }
                    ]
                },
                passar_atualizador: {
                    instruction: "Execute o atualizador de versões no sistema do cliente.",
                    isEnd: true,
                    type: "action",
                    title: "Fim - Atualizar Versões"
                },
                reconfigurar_emissor_zero: {
                    instruction: "Reconfigure as definições do emissor NFSe do zero.",
                    question: "Reconfigurado?",
                    options: [
                        { label: "Sim, Próximo", next: "limpar_tabela_config" }
                    ]
                },
                limpar_tabela_config: {
                    instruction: "Na tabela 'softcom_modulo_configurações', apague os dados da NFSe. Reconfigure e teste novamente.",
                    question: "A nota subiu agora para a Migrate?",
                    options: [
                        { label: "Sim", next: "foi_autorizada" },
                        { label: "Não", next: "abrir_ticket_migrate" }
                    ]
                },
                fim_sucesso: {
                    instruction: "Excelente! O problema foi resolvido com sucesso.",
                    isEnd: true,
                    type: "success",
                    title: "Fim - Resolvido"
                }
            };

            // --- LÓGICA SUPABASE ---

            const fetchErrors = async () => {
                setLoading(true);
                const { data, error } = await supabase
                    .from('mapped_errors')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (data) setMappedErrors(data);
                if (error) console.error("Erro ao buscar dados:", error);
                setLoading(false);
            };

            useEffect(() => {
                fetchErrors();
            }, []);

            const handleSaveError = async (e) => {
                e.preventDefault();
                if (!errorInput || !solutionInput) return;
                setSaveStatus('loading');

                const { data, error } = await supabase
                    .from('mapped_errors')
                    .insert([{ erro: errorInput, solucao: solutionInput }]);

                if (error) {
                    setSaveStatus('error');
                    console.error("Erro ao gravar:", error);
                } else {
                    setSaveStatus('success');
                    setErrorInput('');
                    setSolutionInput('');
                    fetchErrors();
                    setTimeout(() => { setSaveStatus(null); setView('erros_mapeados'); }, 1500);
                }
            };

            const deleteError = async (id) => {
                if (!confirm("Remover permanentemente esta solução?")) return;
                const { error } = await supabase
                    .from('mapped_errors')
                    .delete()
                    .eq('id', id);
                
                if (!error) fetchErrors();
            };

            const filteredErrors = useMemo(() => {
                if (!searchQuery) return mappedErrors;
                const q = searchQuery.toLowerCase();
                return mappedErrors.filter(e => 
                    e.erro.toLowerCase().includes(q) || e.solucao.toLowerCase().includes(q)
                );
            }, [mappedErrors, searchQuery]);

            const copyToClipboard = (text, key) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(prev => ({ ...prev, [key]: true }));
                setTimeout(() => setCopyStatus(prev => ({ ...prev, [key]: false })), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 font-sans">
                    <header className="bg-[#2d3e50] text-white shadow-lg p-4 px-6 flex items-center justify-between border-b-4 border-[#f59e0b] z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                                {menuOpen ? <IconX /> : <IconMenu />}
                            </button>
                            <SoftcomLogo />
                        </div>
                        <div className="hidden md:flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span className="text-slate-400 text-[10px] font-black uppercase tracking-widest leading-none">Supabase Cloud</span>
                        </div>
                    </header>

                    {/* Menu Lateral */}
                    <div className={`fixed inset-y-0 left-0 w-64 bg-[#2d3e50] shadow-2xl z-40 transform transition-transform duration-300 ease-in-out border-r border-slate-700 pt-24 ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-4 flex flex-col gap-2">
                            <button onClick={() => { setView('analise'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'analise' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconHelp /> ASSISTENTE NFSE
                            </button>
                            <button onClick={() => { setView('erros_mapeados'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'erros_mapeados' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconSearch /> ERROS MAPEADOS
                            </button>
                            <button onClick={() => { setView('mapear_erro'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'mapear_erro' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconPlus /> MAPEAR ERRO
                            </button>
                            <div className="my-2 border-t border-slate-700"></div>
                            <button onClick={() => { setView('migrate'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'migrate' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconFileText /> TICKET MIGRATE
                            </button>
                            <button onClick={() => { setView('especialista'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'especialista' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconShield /> SETOR ESPECIALISTA
                            </button>
                        </nav>
                    </div>

                    {menuOpen && <div className="fixed inset-0 bg-black/50 z-30" onClick={() => setMenuOpen(false)}></div>}

                    <main className="max-w-6xl mx-auto w-full p-4 md:p-8 flex-1 flex flex-col">
                        
                        {/* VIEW: ASSISTENTE NFSE */}
                        {view === 'analise' && (
                            <div className="animate-fadeIn max-w-2xl mx-auto w-full space-y-8">
                                <div className="text-center">
                                    <h1 className="text-3xl font-black text-slate-800 italic uppercase mb-1 leading-none">Assistente NFSe</h1>
                                    <p className="text-slate-500 font-medium italic uppercase text-[10px]">Diagnóstico Inteligente Softcom</p>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden min-h-[420px] flex flex-col">
                                    <div className="h-2 bg-slate-100 w-full">
                                        <div className="h-full bg-[#f59e0b] transition-all duration-500" style={{ width: `${(flowHistory.length / 14) * 100}%` }}></div>
                                    </div>
                                    <div className="p-8 md:p-12 flex-1 flex flex-col justify-center items-center text-center">
                                        {flowchart[currentStep].instruction && (
                                            <div className="bg-amber-50 border-l-4 border-[#f59e0b] p-6 rounded-r-xl w-full mb-8 text-left animate-fadeIn">
                                                <h3 className="text-amber-800 font-black uppercase text-[10px] mb-1 tracking-widest italic leading-none">Ação Requerida:</h3>
                                                <p className="text-slate-700 text-lg font-bold leading-tight">{flowchart[currentStep].instruction}</p>
                                            </div>
                                        )}
                                        {!flowchart[currentStep].isEnd ? (
                                            <div className="space-y-8 w-full animate-fadeIn">
                                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 italic uppercase leading-tight tracking-tighter">{flowchart[currentStep].question}</h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {flowchart[currentStep].options ? flowchart[currentStep].options.map((opt, i) => (
                                                        <button key={i} onClick={() => { setFlowHistory([...flowHistory, currentStep]); setCurrentStep(opt.next); }} className="group flex items-center justify-between p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-[#f59e0b] hover:bg-amber-50 transition-all text-left">
                                                            <span className="text-lg font-bold text-[#2d3e50] group-hover:text-amber-900 leading-tight">{opt.label}</span>
                                                            <div className="bg-white p-2 rounded-full shadow-sm group-hover:bg-[#f59e0b] transition-colors"><IconArrowRight /></div>
                                                        </button>
                                                    )) : (
                                                        <button onClick={() => { setFlowHistory([...flowHistory, currentStep]); setCurrentStep(flowchart[currentStep].next); }} className="col-span-2 flex items-center justify-center gap-3 p-6 bg-[#2d3e50] text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs">Próxima Etapa <IconArrowRight /></button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="animate-fadeIn flex flex-col items-center text-center space-y-6">
                                                <div className={`p-8 rounded-full ${flowchart[currentStep].type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-softcom-blue'} border-4 border-white shadow-xl`}>
                                                    {flowchart[currentStep].type === 'success' ? <IconCheck /> : <IconShield />}
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">{flowchart[currentStep].title}</h2>
                                                <button onClick={() => { setFlowHistory([]); setCurrentStep('inicio'); }} className="bg-slate-200 text-slate-600 px-10 py-4 rounded-full font-black hover:bg-slate-300 transition-all uppercase tracking-widest text-[10px]">Novo Diagnóstico</button>
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 p-4 border-t flex justify-between px-8 text-[10px] font-black uppercase tracking-widest">
                                        <button onClick={() => { if(flowHistory.length > 0) { const prev = flowHistory[flowHistory.length - 1]; setFlowHistory(flowHistory.slice(0, -1)); setCurrentStep(prev); } }} disabled={flowHistory.length === 0} className="text-slate-400 disabled:opacity-0 hover:text-slate-600 transition-colors flex items-center gap-1">← Voltar</button>
                                        <button onClick={() => { setFlowHistory([]); setCurrentStep('inicio'); }} className="text-slate-400 hover:text-red-500 transition-colors">Reiniciar Fluxo</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: MAPEAR ERRO */}
                        {view === 'mapear_erro' && (
                            <div className="animate-fadeIn max-w-2xl mx-auto w-full">
                                <div className="mb-8 flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconPlus /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter">Mapear Novo Erro</h2>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
                                    <form onSubmit={handleSaveError} className="space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 leading-none">Mensagem do Erro</label>
                                            <textarea required rows="3" value={errorInput} onChange={(e) => setErrorInput(e.target.value)} placeholder="Copie aqui a mensagem de rejeição da Migrate..." className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold placeholder:font-normal" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2 leading-none">Solução Técnica</label>
                                            <textarea required rows="6" value={solutionInput} onChange={(e) => setSolutionInput(e.target.value)} placeholder="Passo a passo da correção..." className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold placeholder:font-normal" />
                                        </div>
                                        <button type="submit" disabled={saveStatus === 'loading'} className="w-full bg-[#2d3e50] text-white font-black py-5 rounded-2xl hover:bg-slate-800 transition-all uppercase tracking-widest shadow-lg flex items-center justify-center gap-3">
                                            {saveStatus === 'loading' ? 'A GUARDAR...' : saveStatus === 'success' ? <><IconCheck /> GUARDADO NO BANCO</> : 'GRAVAR SOLUÇÃO'}
                                        </button>
                                        {saveStatus === 'error' && <p className="text-red-500 text-center font-bold text-xs">Erro ao ligar ao banco. Verifique a tabela Supabase.</p>}
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* VIEW: ERROS MAPEADOS */}
                        {view === 'erros_mapeados' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Base de Soluções</h2>
                                    </div>
                                    <div className="relative w-full max-w-md">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><IconSearch /></div>
                                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Pesquisar por erro ou solução..." className="w-full pl-12 pr-4 py-4 bg-white border-2 border-slate-200 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold shadow-sm" />
                                    </div>
                                </div>

                                {loading ? (
                                    <div className="py-20 text-center">
                                        <div className="w-8 h-8 border-4 border-[#f59e0b] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest">A ler Supabase...</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredErrors.length === 0 ? (
                                            <div className="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                                <p className="text-slate-400 font-bold italic tracking-tighter">Nenhuma solução encontrada para esta pesquisa.</p>
                                            </div>
                                        ) : filteredErrors.map((item) => (
                                            <div key={item.id} onClick={() => setSelectedError(item)} className="bg-white rounded-3xl shadow-md border-2 border-transparent hover:border-[#f59e0b] transition-all p-6 flex flex-col group h-fit cursor-pointer relative">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="bg-slate-100 p-2 rounded-lg text-[#2d3e50]"><IconFileText /></div>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteError(item.id); }} className="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all p-1"><IconTrash /></button>
                                                </div>
                                                <h3 className="text-slate-800 font-black uppercase text-xs italic tracking-tight mb-3 line-clamp-2 leading-tight border-l-4 border-[#f59e0b] pl-3">
                                                    {item.erro}
                                                </h3>
                                                <div className="bg-slate-50 p-4 rounded-2xl flex-1 mb-4 overflow-hidden">
                                                    <p className="text-xs text-slate-600 leading-relaxed font-bold line-clamp-[8] whitespace-pre-wrap">{item.solucao}</p>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); copyToClipboard(item.solucao, item.id); }} className="w-full py-3 bg-slate-100 text-[#2d3e50] rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-[#2d3e50] hover:text-white transition-all flex items-center justify-center gap-2">
                                                    {copyStatus[item.id] ? <><IconCheck /> COPIADO</> : <><IconClipboard /> COPIAR SOLUÇÃO</>}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* MODAL DE DETALHES (PASSO A PASSO) */}
                                {selectedError && (
                                    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-[#2d3e50]/80 backdrop-blur-sm animate-fadeIn" onClick={() => setSelectedError(null)}>
                                        <div className="bg-white w-full max-w-3xl max-h-[85vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-fadeIn" onClick={e => e.stopPropagation()}>
                                            <div className="bg-[#2d3e50] p-6 flex justify-between items-start border-b-4 border-[#f59e0b]">
                                                <div className="flex items-center gap-3">
                                                    <div className="bg-[#f59e0b] p-2 rounded-lg text-[#2d3e50]"><IconFileText /></div>
                                                    <h3 className="text-white font-black text-lg italic uppercase tracking-tighter leading-tight pr-8">{selectedError.erro}</h3>
                                                </div>
                                                <button onClick={() => setSelectedError(null)} className="text-white/50 hover:text-white transition-colors"><IconX /></button>
                                            </div>
                                            <div className="p-8 overflow-y-auto custom-scrollbar bg-slate-50 flex-1">
                                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                                    <h4 className="text-[#f59e0b] font-black uppercase text-xs tracking-widest mb-4 border-b pb-2">Passo a Passo da Solução</h4>
                                                    <div className="prose prose-slate max-w-none whitespace-pre-wrap font-medium text-slate-700 leading-loose text-sm">
                                                        {selectedError.solucao}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-4 bg-white border-t flex justify-end gap-3">
                                                <button onClick={() => copyToClipboard(selectedError.solucao, 'modal_copy')} className="px-6 py-3 bg-slate-100 text-[#2d3e50] rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all flex items-center gap-2">
                                                    {copyStatus['modal_copy'] ? <><IconCheck /> Copiado</> : <><IconClipboard /> Copiar Texto</>}
                                                </button>
                                                <button onClick={() => setSelectedError(null)} className="px-6 py-3 bg-[#2d3e50] text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-800 transition-all">
                                                    Fechar
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: TICKET MIGRATE */}
                        {view === 'migrate' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn w-full max-w-6xl">
                                <div className="lg:col-span-7 bg-white rounded-2xl shadow-xl border border-slate-200 p-6 space-y-6 h-fit">
                                    <div className="flex items-center gap-2 mb-2"><IconFileText /><h2 className="font-black text-slate-700 uppercase italic tracking-tighter text-xl underline decoration-[#f59e0b] decoration-4 leading-none">Ticket Migrate</h2></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="empresa" value={ticketForm.empresa} onChange={(e) => setTicketForm({...ticketForm, empresa: e.target.value})} placeholder="Empresa" className="p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full font-bold" />
                                        <input name="cnpj" value={ticketForm.cnpj} onChange={(e) => setTicketForm({...ticketForm, cnpj: e.target.value})} placeholder="CNPJ" className="p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full font-bold" />
                                    </div>
                                    <textarea rows="4" placeholder="Descreva a Rejeição..." onChange={(e) => setTicketForm({...ticketForm, erro: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] resize-none font-bold" />
                                    <button onClick={() => { 
                                        const h = new Date().getHours();
                                        const s = h < 12 ? 'Bom dia' : 'Boa tarde';
                                        const t = `${s},\n\nEmpresa: ${ticketForm.empresa}\nCNPJ: ${ticketForm.cnpj}\n\nErro identificado: ${ticketForm.erro}\n\nSuporte Softcom solicita análise técnica.`;
                                        setGeneratedText(t);
                                    }} className="w-full bg-[#2d3e50] text-white font-black py-4 rounded-xl hover:bg-slate-800 transition-all uppercase tracking-widest text-sm shadow-lg">Gerar Mensagem</button>
                                </div>
                                <div className="lg:col-span-5 bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col min-h-[400px]">
                                    <div className="bg-[#2d3e50] p-4 flex justify-between items-center text-white"><span className="text-xs font-black uppercase italic tracking-widest leading-none">Resultado</span>
                                    {generatedText && <button onClick={() => copyToClipboard(generatedText, 'ticket')} className={`p-2 rounded ${copyStatus['ticket'] ? 'bg-emerald-500' : 'bg-[#f59e0b]'} text-[#2d3e50] transition-colors`}><IconClipboard /></button>}</div>
                                    <div className="p-6 bg-slate-50 flex-1 font-mono text-xs text-slate-700 whitespace-pre-wrap select-all leading-relaxed">{generatedText || "Aguardando geração..."}</div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: ESPECIALISTA */}
                        {view === 'especialista' && (
                            <div className="animate-fadeIn flex justify-center pt-10 w-full">
                                {!isEspecialistaAuthed ? (
                                    <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 w-full max-w-sm text-center">
                                        <div className="mb-6 flex justify-center"><div className="bg-slate-100 p-6 rounded-full text-[#f59e0b]"><IconShield /></div></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter mb-6 leading-none">Acesso PIN</h2>
                                        <input type="password" maxLength="4" value={pinInput} onChange={(e) => { setPinInput(e.target.value); if(e.target.value === '7711') setIsEspecialistaAuthed(true); }} placeholder="PIN" className="w-full text-center text-4xl p-4 bg-slate-50 border-2 rounded-2xl outline-none border-slate-200 focus:border-[#f59e0b] tracking-[0.5em] font-black" autoFocus />
                                    </div>
                                ) : (
                                    <div className="w-full max-w-lg bg-white p-8 rounded-3xl shadow-xl text-center">
                                        <h2 className="text-2xl font-black text-[#2d3e50] uppercase italic tracking-tighter mb-4">Setor Especialista Ativo</h2>
                                        <p className="text-slate-500 font-bold uppercase text-xs">Acesso total às ferramentas de suporte avançado.</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="text-center p-8 text-slate-400 text-[10px] font-black uppercase italic tracking-widest leading-none">
                        Softcom Tecnologia &copy; {new Date().getFullYear()} - Assistente NFSe Cloud
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
