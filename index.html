<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softcom - Assistente NFSe</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .softcom-italic { font-style: italic; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d3e50; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        #root { min-height: 100vh; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-[#2d3e50]">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-t-[#f59e0b] border-slate-600 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-white font-bold italic">A carregar Assistente NFSe...</p>
            </div>
        </div>
    </div>

    <script type="text/babel" data-presets="react" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        let firebaseApp, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'softcom-nfse-assistente';
        
        try {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            if (config) {
                firebaseApp = initializeApp(config);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
            }
        } catch (e) {
            console.warn("Firebase offline mode");
        }

        const IconHelp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconClipboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>;

        const SoftcomLogo = ({ size = "45" }) => (
            <div className="flex items-center gap-2">
                <svg width={size} height={(size * 35)/45} viewBox="0 0 45 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 8C4 6.89543 4.89543 6 6 6H16.5L19.5 9H39C40.1046 9 41 9.89543 41 11V13H4V8Z" fill="#EAB308" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                    <path d="M2 12C2 10.8954 2.89543 10 4 10H41C42.1046 10 43 10.8954 43 12V28C43 29.1046 42.1046 30 41 30H4C2.89543 30 2 29.1046 2 28V12Z" fill="#FBCC14" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                </svg>
                <span className="text-3xl font-black italic tracking-tighter text-white select-none softcom-italic" style={{ letterSpacing: '-0.08em' }}>
                    softcom
                </span>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('analise');
            const [menuOpen, setMenuOpen] = useState(false);
            const [user, setUser] = useState(null);
            
            const [currentStep, setCurrentStep] = useState('inicio');
            const [flowHistory, setFlowHistory] = useState([]);

            const [isEspecialistaAuthed, setIsEspecialistaAuthed] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);
            const [credenciais, setCredenciais] = useState([
                { plataforma: "Migrate", login: "suporte.nfse.softcom@gmail.com", senha: "Sfc@3321", color: "border-blue-500", order: 1 },
                { plataforma: "Invoicy", login: "renato.rodrigues@softcomtecnologia.com.br", senha: "Softcom12", color: "border-emerald-500", order: 2 }
            ]);
            
            const [formData, setFormData] = useState({ empresa: '', cnpj: '', cidade: '', mensagemErro: '', detalhes: '', ticketAberto: '', ambiente: '' });
            const [generatedText, setGeneratedText] = useState('');
            const [copyStatus, setCopyStatus] = useState({});

            const flowchart = {
                inicio: {
                    question: "O cliente já emite NFS-e pelo sistema?",
                    options: [
                        { label: "Sim", next: "cliente_desktop_web" },
                        { label: "Não", next: "solicitar_xml_pdf" }
                    ]
                },
                solicitar_xml_pdf: {
                    instruction: "Peça ao cliente o XML de uma nota teste e o PDF emitido este ano na prefeitura.",
                    question: "Arquivos recebidos?",
                    options: [
                        { label: "Sim", next: "comparar_dados" },
                        { label: "Não", next: "solicitar_xml_pdf" }
                    ]
                },
                comparar_dados: {
                    instruction: "Compare os dados da nota do sistema com a nota teste e deixe os dados do serviço iguais.",
                    question: "O ajuste resolveu o problema?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "cliente_desktop_web" }
                    ]
                },
                cliente_desktop_web: {
                    question: "Qual o ambiente do cliente?",
                    options: [
                        { label: "Desktop", next: "subindo_migrate" },
                        { label: "Web", next: "subindo_migrate" }
                    ]
                },
                subindo_migrate: {
                    question: "A nota está a subir para o monitor da Migrate?",
                    options: [
                        { label: "Sim", next: "foi_autorizada" },
                        { label: "Não", next: "verificar_versao_emissor" }
                    ]
                },
                foi_autorizada: {
                    question: "A nota foi autorizada na prefeitura?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não (Rejeitada)", next: "verificar_erro_exibe" }
                    ]
                },
                verificar_erro_exibe: {
                    instruction: "Analise o erro exibido no monitor da Migrate. Utilize o GPT ou Google para interpretar o erro detalhadamente se necessário.",
                    question: "Conseguiu resolver com o ajuste técnico?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "abrir_ticket_migrate" }
                    ]
                },
                abrir_ticket_migrate: {
                    instruction: "Abra um ticket com a Migrate relatando o incidente e anexe as evidências (XML e erro).",
                    isEnd: true,
                    type: "action",
                    title: "Fim - Abrir Ticket"
                },
                verificar_versao_emissor: {
                    instruction: "Verifique a versão do emissor de notas e valide se está atualizado.",
                    question: "Versão verificada?",
                    options: [
                        { label: "Sim, Próximo", next: "refazer_pedido_zero" }
                    ]
                },
                refazer_pedido_zero: {
                    instruction: "Refaça o pedido do zero no sistema e tente emitir a nota novamente.",
                    question: "Resolveu o problema?",
                    options: [
                        { label: "Sim", next: "fim_sucesso" },
                        { label: "Não", next: "versao_inferior_910" }
                    ]
                },
                versao_inferior_910: {
                    question: "A versão do sistema é inferior a 9.10?",
                    options: [
                        { label: "Sim", next: "passar_atualizador" },
                        { label: "Não", next: "reconfigurar_emissor_zero" }
                    ]
                },
                passar_atualizador: {
                    instruction: "Execute o atualizador de versões no sistema do cliente.",
                    isEnd: true,
                    type: "action",
                    title: "Fim - Atualizar Versões"
                },
                reconfigurar_emissor_zero: {
                    instruction: "Reconfigure as definições do emissor NFSe do zero.",
                    question: "Reconfigurado?",
                    options: [
                        { label: "Sim, Próximo", next: "limpar_tabela_config" }
                    ]
                },
                limpar_tabela_config: {
                    instruction: "Na tabela 'softcom_modulo_configurações', apague os dados da NFSe. Reconfigure e teste a emissão novamente.",
                    question: "A nota subiu agora para a Migrate?",
                    options: [
                        { label: "Sim", next: "foi_autorizada" },
                        { label: "Não", next: "abrir_ticket_migrate" }
                    ]
                },
                fim_sucesso: {
                    instruction: "Excelente trabalho! O problema foi resolvido.",
                    isEnd: true,
                    type: "success",
                    title: "Fim - Resolvido"
                }
            };

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error(err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const credRef = collection(db, 'artifacts', appId, 'public', 'data', 'credentials');
                const unsubscribe = onSnapshot(credRef, (snapshot) => {
                    if (!snapshot.empty) {
                        setCredenciais(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => (a.order || 0) - (b.order || 0)));
                    }
                });
                return () => unsubscribe();
            }, [user]);

            const handleFlowOption = (next) => {
                setFlowHistory([...flowHistory, currentStep]);
                setCurrentStep(next);
            };

            const resetFlow = () => {
                setFlowHistory([]);
                setCurrentStep('inicio');
            };

            const goBackFlow = () => {
                if (flowHistory.length === 0) return;
                const prev = flowHistory[flowHistory.length - 1];
                setFlowHistory(flowHistory.slice(0, -1));
                setCurrentStep(prev);
            };

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === '7711') {
                    setIsEspecialistaAuthed(true);
                    setPinError(false);
                } else {
                    setPinError(true);
                    setPinInput('');
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const generateTicket = async () => {
                const hora = new Date().getHours();
                const saudacao = hora < 12 ? 'Bom dia' : 'Boa tarde';
                const text = `Assunto: ${formData.empresa}\n\n${saudacao},\n\nEmpresa: ${formData.empresa}\nCNPJ: ${formData.cnpj}\nMunicípio: ${formData.cidade}\n\nErro: ${formData.mensagemErro}\nAmbiente: ${formData.ambiente}\n\n${formData.detalhes}`;
                setGeneratedText(text);
                
                if (user && db) {
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tickets'), { ...formData, generatedText: text, createdAt: Date.now() });
                    } catch (e) {}
                }
            };

            const copyToClipboard = (text, key) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(prev => ({ ...prev, [key]: true }));
                setTimeout(() => setCopyStatus(prev => ({ ...prev, [key]: false })), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 font-sans">
                    <header className="bg-[#2d3e50] text-white shadow-lg p-4 px-6 flex items-center justify-between border-b-4 border-[#f59e0b] z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                                {menuOpen ? <IconX /> : <IconMenu />}
                            </button>
                            <SoftcomLogo />
                        </div>
                        <div className="hidden md:block text-slate-400 text-[10px] font-bold uppercase tracking-widest leading-none">
                            Suporte Técnico Especializado
                        </div>
                    </header>

                    <div className={`fixed inset-y-0 left-0 w-64 bg-[#2d3e50] shadow-2xl z-40 transform transition-transform duration-300 ease-in-out border-r border-slate-700 pt-24 ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-4 flex flex-col gap-2">
                            <button onClick={() => { setView('analise'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'analise' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconHelp /> ASSISTENTE NFSE
                            </button>
                            <button onClick={() => { setView('migrate'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'migrate' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconFileText /> TICKET MIGRATE
                            </button>
                            <button onClick={() => { setView('links'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'links' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconExternalLink /> LINKS ÚTEIS
                            </button>
                            <div className="my-2 border-t border-slate-700"></div>
                            <button onClick={() => { setView('especialista'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'especialista' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconShield /> SETOR ESPECIALISTA
                            </button>
                        </nav>
                    </div>

                    {menuOpen && <div className="fixed inset-0 bg-black/50 z-30" onClick={() => setMenuOpen(false)}></div>}

                    <main className="max-w-6xl mx-auto w-full p-4 md:p-8 flex-1 flex flex-col items-center">
                        {view === 'analise' && (
                            <div className="animate-fadeIn max-w-2xl w-full space-y-8">
                                <div className="text-center">
                                    <h1 className="text-3xl font-black text-slate-800 italic tracking-tighter uppercase mb-1 leading-none">Assistente NFSe</h1>
                                    <p className="text-slate-500 font-medium italic tracking-tight uppercase text-[10px]">Fluxo de Diagnóstico Técnico</p>
                                </div>

                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden min-h-[420px] flex flex-col">
                                    <div className="h-2 bg-slate-100 w-full">
                                        <div className="h-full bg-[#f59e0b] transition-all duration-500" style={{ width: `${(flowHistory.length / 12) * 100}%` }}></div>
                                    </div>

                                    <div className="p-8 md:p-12 flex-1 flex flex-col justify-center items-center text-center">
                                        {flowchart[currentStep].instruction && (
                                            <div className="bg-amber-50 border-l-4 border-[#f59e0b] p-6 rounded-r-xl w-full mb-8 text-left animate-fadeIn">
                                                <h3 className="text-amber-800 font-black uppercase text-[10px] mb-1 tracking-widest italic leading-none">Ação Requerida:</h3>
                                                <p className="text-slate-700 text-lg font-bold leading-tight">{flowchart[currentStep].instruction}</p>
                                            </div>
                                        )}

                                        {!flowchart[currentStep].isEnd ? (
                                            <div className="space-y-8 w-full animate-fadeIn">
                                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 italic tracking-tighter uppercase leading-tight">
                                                    {flowchart[currentStep].question}
                                                </h2>
                                                
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {flowchart[currentStep].options ? (
                                                        flowchart[currentStep].options.map((opt, i) => (
                                                            <button 
                                                                key={i}
                                                                onClick={() => handleFlowOption(opt.next)}
                                                                className="group flex items-center justify-between p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-[#f59e0b] hover:bg-amber-50 transition-all text-left"
                                                            >
                                                                <span className="text-lg font-bold text-[#2d3e50] group-hover:text-amber-900 leading-tight">{opt.label}</span>
                                                                <div className="bg-white p-2 rounded-full shadow-sm group-hover:bg-[#f59e0b] transition-colors">
                                                                    <IconArrowRight />
                                                                </div>
                                                            </button>
                                                        ))
                                                    ) : (
                                                        <button 
                                                            onClick={() => handleFlowOption(flowchart[currentStep].next)}
                                                            className="col-span-2 flex items-center justify-center gap-3 p-6 bg-[#2d3e50] text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs"
                                                        >
                                                            PRÓXIMA ETAPA <IconArrowRight />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="animate-fadeIn flex flex-col items-center text-center space-y-6">
                                                <div className={`p-8 rounded-full ${flowchart[currentStep].type === 'success' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-[#2d3e50]'} border-4 border-white shadow-xl`}>
                                                    {flowchart[currentStep].type === 'success' ? <IconCheck /> : <IconShield />}
                                                </div>
                                                <div className="space-y-2">
                                                    <h2 className="text-3xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">{flowchart[currentStep].title}</h2>
                                                    <p className="text-slate-500 font-medium max-w-sm">O fluxo de suporte Softcom foi concluído.</p>
                                                </div>
                                                <button onClick={resetFlow} className="bg-slate-100 text-slate-500 px-10 py-4 rounded-full font-black hover:bg-slate-200 transition-all uppercase tracking-widest text-[10px]">Novo Diagnóstico</button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="bg-slate-50 p-4 border-t flex justify-between px-8 text-[10px] font-black uppercase tracking-widest">
                                        <button onClick={goBackFlow} disabled={flowHistory.length === 0} className="text-slate-400 disabled:opacity-0 hover:text-slate-600 transition-colors flex items-center gap-1">← Voltar</button>
                                        <button onClick={resetFlow} className="text-slate-400 hover:text-red-500 transition-colors">Reiniciar Fluxo</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'migrate' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn w-full max-w-6xl">
                                <div className="lg:col-span-7 bg-white rounded-2xl shadow-xl border border-slate-200 p-6 space-y-6">
                                    <div className="flex items-center gap-2 mb-2"><IconFileText /><h2 className="font-black text-slate-700 uppercase italic tracking-tighter text-xl underline decoration-[#f59e0b] decoration-4">Gerador de Ticket</h2></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="empresa" value={formData.empresa} onChange={handleInputChange} placeholder="Empresa" className="p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full" />
                                        <input name="cnpj" value={formData.cnpj} onChange={handleInputChange} placeholder="CNPJ" className="p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full" />
                                    </div>
                                    <div className="grid grid-cols-3 gap-4">
                                        <input name="cidade" value={formData.cidade} onChange={handleInputChange} placeholder="Cidade / UF" className="col-span-2 p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full" />
                                        <input name="ambiente" value={formData.ambiente} onChange={handleInputChange} placeholder="Ambiente" className="p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] w-full" />
                                    </div>
                                    <textarea name="mensagemErro" value={formData.mensagemErro} onChange={handleInputChange} rows="2" placeholder="Mensagem de Erro" className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] resize-none" />
                                    <textarea name="detalhes" value={formData.detalhes} onChange={handleInputChange} rows="2" placeholder="Detalhes Extras" className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:border-[#f59e0b] resize-none" />
                                    <button onClick={generateTicket} className="w-full bg-[#2d3e50] text-white font-black py-4 rounded-xl hover:bg-slate-800 transition-all uppercase tracking-widest text-sm shadow-lg">Gerar Texto</button>
                                </div>
                                <div className="lg:col-span-5 bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col min-h-[400px]">
                                    <div className="bg-[#2d3e50] p-4 flex justify-between items-center text-white"><span className="text-xs font-black uppercase italic tracking-widest">Resultado</span>
                                    {generatedText && <button onClick={() => copyToClipboard(generatedText, 'main')} className={`p-2 rounded ${copyStatus['main'] ? 'bg-green-500' : 'bg-[#f59e0b]'} text-[#2d3e50]`}><IconClipboard /></button>}</div>
                                    <div className="p-6 bg-slate-50 flex-1 font-mono text-xs text-slate-700 whitespace-pre-wrap select-all leading-relaxed">
                                        {generatedText || "O texto gerado aparecerá aqui..."}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'links' && (
                            <div className="animate-fadeIn grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
                                {[
                                    { title: "Dashboard Migrate", url: "https://painel-dfe-production-382497636524.us-central1.run.app/", desc: "Status dos serviços NFS-e." },
                                    { title: "Atendimento Migrate", url: "https://atendimento.migrate.com.br/", desc: "Chamados oficiais Migrate." },
                                    { title: "Login Invoicy", url: "https://web.invoicy.com.br/login.aspx", desc: "Plataforma de gestão Invoicy." }
                                ].map((l, i) => (
                                    <a key={i} href={l.url} target="_blank" className="bg-white p-6 rounded-2xl shadow-md border-t-8 border-[#f59e0b] hover:shadow-xl transition-all group flex flex-col h-full">
                                        <h3 className="font-black text-slate-800 uppercase italic tracking-tighter mb-2 group-hover:text-amber-600">{l.title}</h3>
                                        <p className="text-xs text-slate-500 mb-4 flex-1">{l.desc}</p>
                                        <div className="text-[10px] text-blue-500 truncate bg-slate-50 p-2 rounded border border-slate-100">{l.url}</div>
                                    </a>
                                ))}
                            </div>
                        )}

                        {view === 'especialista' && (
                            <div className="animate-fadeIn flex justify-center pt-10 w-full">
                                {!isEspecialistaAuthed ? (
                                    <div className="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 w-full max-w-sm text-center">
                                        <div className="mb-6 flex justify-center"><div className="bg-slate-100 p-6 rounded-full text-[#f59e0b]"><IconShield /></div></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter mb-6">Setor Especialista</h2>
                                        <form onSubmit={handlePinSubmit} className="space-y-4">
                                            <input type="password" maxLength="4" value={pinInput} onChange={(e) => setPinInput(e.target.value.replace(/\D/g, ''))} placeholder="PIN" className={`w-full text-center text-4xl p-4 bg-slate-50 border-2 rounded-2xl outline-none ${pinError ? 'border-red-500 animate-shake shadow-red-100 shadow-inner' : 'border-slate-200 focus:border-[#f59e0b]'}`} autoFocus />
                                            <button type="submit" className="w-full bg-[#2d3e50] text-white font-black py-4 rounded-2xl hover:bg-slate-800 transition-all uppercase shadow-lg tracking-widest">Desbloquear</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {credenciais.map((cred, idx) => (
                                            <div key={idx} className={`bg-white rounded-2xl shadow-lg border-t-8 ${cred.color || 'border-slate-400'} overflow-hidden`}>
                                                <div className="p-6">
                                                    <h3 className="font-black text-xl text-slate-800 uppercase italic tracking-tighter mb-6 flex items-center gap-2 underline decoration-[#f59e0b] decoration-4">{cred.plataforma}</h3>
                                                    <div className="space-y-4">
                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">E-mail</label>
                                                            <div className="flex bg-slate-50 p-3 rounded-xl border border-slate-200 items-center gap-2">
                                                                <span className="flex-1 font-mono text-sm truncate">{cred.login}</span>
                                                                <button onClick={() => copyToClipboard(cred.login, `l-${idx}`)} className={`p-2 rounded transition-colors ${copyStatus[`l-${idx}`] ? 'bg-green-500 text-white' : 'text-slate-400 hover:text-slate-600'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Senha</label>
                                                            <div className="flex bg-slate-50 p-3 rounded-xl border border-slate-200 items-center gap-2">
                                                                <span className="flex-1 font-mono text-sm font-black tracking-widest">{cred.senha}</span>
                                                                <button onClick={() => copyToClipboard(cred.senha, `p-${idx}`)} className={`p-2 rounded transition-colors ${copyStatus[`p-${idx}`] ? 'bg-green-500 text-white' : 'text-slate-400 hover:text-slate-600'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="text-center p-8 text-slate-400 text-[10px] uppercase tracking-widest font-black italic">
                        Softcom Tecnologia &copy; {new Date().getFullYear()} - Apoio Técnico
                    </footer>
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            console.error("Render error:", e);
        }
    </script>
</body>
</html>
