        // --- Componente de Input Rico (Bold, Italic, Spellcheck) ---
        const RichInput = ({ value, onChange, placeholder, className, rows = 4, required = false }) => {
            const textareaRef = React.useRef(null);

            const insertFormat = (tag) => {
                const textarea = textareaRef.current;
                if (!textarea) return;
                
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                
                const before = text.substring(0, start);
                const selection = text.substring(start, end);
                const after = text.substring(end);
                
                const newText = before + tag + selection + tag + after;
                
                // Simula evento de mudança
                const event = { target: { value: newText } };
                onChange(event);
                
                setTimeout(() => {
                    textarea.focus();
                    textarea.setSelectionRange(start + tag.length, end + tag.length);
                }, 0);
            };

            return (
                <div className="relative group">
                    <div className="absolute right-2 top-2 flex gap-1 z-20 bg-slate-100/90 dark:bg-slate-700/90 backdrop-blur-sm p-1 rounded-lg border border-slate-200 dark:border-slate-600 shadow-sm">

        // --- Componente para Visualização de Código (Estilo VS Code) ---
        const SolutionViewer = ({ text }) => {
            if (!text) return null;

            // Palavras-chave simples para highlight básico de SQL
            const sqlKeywords = /\b(SELECT|FROM|WHERE|AND|OR|ORDER BY|GROUP BY|INSERT|INTO|VALUES|UPDATE|SET|DELETE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|LIMIT|OFFSET|HAVING|AS|CASE|WHEN|THEN|ELSE|END|IS|NULL|NOT|IN|EXISTS|LIKE|BETWEEN)\b/gi;

            // Renderiza um bloco de código com estilo
            const CodeBlock = ({ content }) => {
                // Tentativa simples de highlight (apenas colore keywords)
                const highlighted = content.split(sqlKeywords).map((part, i) => {
                    if (part.match(sqlKeywords)) {
                        return <span key={i} className="text-[#c586c0] font-bold">{part}</span>; // Cor rosa/roxo estilo VS Code
                    }
                    return part;
                });

                return (
                    <div className="bg-[#1e1e1e] text-[#d4d4d4] rounded-xl overflow-hidden my-3 border border-slate-700 shadow-lg group relative">
                        <div className="bg-[#252526] px-4 py-1.5 flex justify-between items-center border-b border-[#3e3e42]">

                            </div>
                            <span className="text-[10px] text-slate-400 font-mono uppercase tracking-widest">SQL / Query</span>
                        </div>
                        <div className="p-4 overflow-x-auto custom-scrollbar">
                            <pre className="font-mono text-sm leading-relaxed whitespace-pre">{highlighted}</pre>
                        </div>
                    </div>
                );
            };

            // Detecta se é puramente código (SQL) sem formatação markdown
            const isPureSQL = /^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|WITH|--)/i.test(text);

            if (isPureSQL && !text.includes('```')) {
                return <CodeBlock content={text} />;
            }

            // Renderiza texto formatado (Bold/Italic)
            const FormatText = ({ content }) => {
                // Divide por **negrito** e *italico*
                const parts = content.split(/(\*\*.*?\*\*|\*.*?\*)/g);
                return parts.map((part, i) => {
                    if (part.startsWith('**') && part.endsWith('**') && part.length > 4) {
                        return <strong key={i} className="font-black text-slate-800 dark:text-white">{part.slice(2, -2)}</strong>;
                    }
                    if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
                        return <em key={i} className="italic text-slate-600 dark:text-slate-300 bg-amber-50 dark:bg-amber-900/30 px-1 rounded">{part.slice(1, -1)}</em>;
                    }
                    return part;
                });
            };

            // Parser simples de Markdown (apenas para blocos de código)
            const parts = text.split(/```/);
            return (
                <div className="whitespace-pre-wrap leading-relaxed text-slate-600 dark:text-slate-300">
                    {parts.map((part, index) => 
                        index % 2 === 1 ? <CodeBlock key={index} content={part} /> : <FormatText key={index} content={part} />
                    )}
                </div>
            );
        };

            const credenciais = [
                { portal: "Invoicy", user: "renato.rodrigues@softcomtecnologia.com.br", pass: "Softcom12" },
                { portal: "Migrate", user: "suporte.nfse.softcom@gmail.com", pass: "Sfc@3321" }
            ];

            const listaUFs = ['AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'];

            useEffect(() => {
                // Carregar preferencia
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            const toggleTheme = () => {
                const newMode = !darkMode;
                setDarkMode(newMode);
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', newMode ? 'dark' : 'light');
            };

            const fetchErrors = async () => {
                setLoading(true);
                const { data } = await supabase.from('mapped_errors').select('*').order('created_at', { ascending: false });
                if (data) setMappedErrors(data);
                setLoading(false);
            };

            useEffect(() => { fetchErrors(); }, []);

            const openEditModal = (item) => {
                setEditErrorInput(item.erro);
                setEditSolutionInput(item.solucao);
                setEditVideoInput(item.video_url || '');
                setEditCategoryInput(item.categoria || 'Softshop');
                setEditingError(item);
            };

            const handleUpdateError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').update({ 
                    erro: editErrorInput, 
                    solucao: editSolutionInput,
                    video_url: editVideoInput,
                    categoria: editCategoryInput
                }).eq('id', editingError.id);
                
                if (error) setSaveStatus('error');
                else {
                    setSaveStatus('success');
                    fetchErrors();
                    setTimeout(() => {
                        setSaveStatus(null);
                        setEditingError(null);
                        if(selectedError && selectedError.id === editingError.id) {
                            setSelectedError({...selectedError, erro: editErrorInput, solucao: editSolutionInput, video_url: editVideoInput, categoria: editCategoryInput});
                        }
                    }, 1000);
                }
            };

            const handleSaveError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').insert([{ 
                    erro: errorInput, 
                    solucao: solutionInput,
                    video_url: videoInput,
                    categoria: categoryInput
                }]);
                if (error) setSaveStatus('error');
                else {
                    setSaveStatus('success');
                    setErrorInput(''); setSolutionInput(''); setVideoInput(''); setCategoryInput('Softshop');
                    fetchErrors();
                    setTimeout(() => { setSaveStatus(null); setView('erros_mapeados'); }, 1500);
                }
            };

            const deleteError = async (id) => {
                if (!confirm("Remover permanentemente esta solução?")) return;
                await supabase.from('mapped_errors').delete().eq('id', id);
                fetchErrors();
            };

            const fetchMunicipios = async (termo = '') => {
                setLoadingMun(true);
                try {
                    let query = supabase.from('municipios').select('*');

                    if (filtroAderentes) {
                        query.eq('AderenteAmbienteNacional', 'Sim').eq('AderenteEmissorNacional', 'Sim');
                    }

                    if (filtroUF) {
                        query.eq('UF', filtroUF);
                    }

                    if (termo) {
                        query = query.ilike('NomeMunicipio', `%${termo}%`);
                    }
                    const { data, error } = await query.order('UF').order('NomeMunicipio').limit(50);
                    
                    if (error) {
                        console.error("Erro Supabase:", error);
                        setMunicipios([]);
                    } else if (data) {
                        console.log("Dados recebidos:", data);
                        setMunicipios(data);
                    }
                } catch (e) { console.error("Exceção:", e); }
                setLoadingMun(false);
            };

            // Efeito para Autocomplete (Sugestões enquanto digita)
            useEffect(() => {
                // Só busca se tiver 2 ou mais caracteres e se a lista de sugestões não estiver visível (evita loop ao clicar)
                // Mas precisamos permitir refinar, então o click vai desligar o mostrarSugestoes
                if (searchMun.length < 2) {
                    setSugestoes([]);
                    setMostrarSugestoes(false);
                    return;
                }

                setLoadingSugestoes(true);
                const timer = setTimeout(async () => {
                    // Busca Inteligente: Procura no Nome OU na UF
                    const { data } = await supabase.from('municipios')
                        .select('NomeMunicipio, UF')
                        .or(`NomeMunicipio.ilike.%${searchMun}%,UF.ilike.%${searchMun}%`)
                        .limit(5);
                    
                    setLoadingSugestoes(false);
                    
                    if (data) {
                        setSugestoes(data);
                        setMostrarSugestoes(true);
                        setSelectedIndex(-1); // Reseta seleção ao digitar
                    } else {
                        setMostrarSugestoes(false);
                    }
                }, 300); // Delay de 300ms para não pesar o banco

                return () => clearTimeout(timer);
            }, [searchMun]);

            // Função para destacar o texto pesquisado
            const highlightMatch = (text, query) => {
                if (!query) return text;
                const parts = text.split(new RegExp(`(${query})`, 'gi'));
                return parts.map((part, index) => 
                    part.toLowerCase() === query.toLowerCase() ? <span key={index} className="text-[#f59e0b] bg-[#f59e0b]/10 rounded px-0.5">{part}</span> : part
                );
            };

            const handleKeyDown = (e) => {
                if (!mostrarSugestoes || sugestoes.length === 0) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setSelectedIndex(prev => (prev < sugestoes.length - 1 ? prev + 1 : prev));
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setSelectedIndex(prev => (prev > 0 ? prev - 1 : -1));
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    e.preventDefault();
                    const selecionado = sugestoes[selectedIndex];
                    setSearchMun(getVal(selecionado, 'NomeMunicipio'));
                    setMostrarSugestoes(false);
                    fetchMunicipios(getVal(selecionado, 'NomeMunicipio'));
                } else if (e.key === 'Escape') {
                    setMostrarSugestoes(false);
                }
            };

            const fetchStats = async () => {
                try {
                    // 1. Consulta Total (considerando filtro UF)
                    let queryTotal = supabase.from('municipios').select('*', { count: 'exact', head: true });
                    if (filtroUF) queryTotal = queryTotal.eq('UF', filtroUF);
                    
                    const { count: total, error: errTotal } = await queryTotal;
                    
                    // 2. Consulta Aderentes (considerando filtro UF)
                    let queryAderentes = supabase.from('municipios').select('*', { count: 'exact', head: true })
                        .eq('AderenteAmbienteNacional', 'Sim')
                        .eq('AderenteEmissorNacional', 'Sim');
                    
                    if (filtroUF) queryAderentes = queryAderentes.eq('UF', filtroUF);
                        
                    let { count: aderentes, error: errAderentes } = await queryAderentes;
                        
                    // Fallback para colunas em minúsculo se falhar a primeira tentativa
                    if (errAderentes) {
                        let queryLow = supabase.from('municipios').select('*', { count: 'exact', head: true })
                            .eq('aderenteambientenacional', 'Sim')
                            .eq('aderenteemissornacional', 'Sim');
                            
                        if (filtroUF) queryLow = queryLow.eq('uf', filtroUF);

                        const { count: aderentesLow } = await queryLow;
                        if (aderentesLow !== null) aderentes = aderentesLow;
                    }

                    if (total !== null && aderentes !== null) {
                        setStats({ total, aderentes, naoAderentes: total - aderentes });
                    }
                } catch (e) { console.error("Erro stats:", e); }
            };

            const filteredErrors = useMemo(() => {
                let filtered = mappedErrors;
                
                if (filterCategory) {
                    filtered = filtered.filter(e => e.categoria === filterCategory);
                }
                
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(e => e.erro.toLowerCase().includes(q) || e.solucao.toLowerCase().includes(q));
                }
                
                return filtered;
            }, [mappedErrors, searchQuery, filterCategory]);

            const copyToClipboard = (text, key) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(prev => ({ ...prev, [key]: true }));
                setTimeout(() => setCopyStatus(prev => ({ ...prev, [key]: false })), 2000);
            };

            // Atualiza a mensagem final quando os dados do formulário mudam
            useEffect(() => {
                const texto = `Assunto: ${ticketData.erro.split('\n')[0] || 'Erro na Emissão'} - ${ticketData.empresa || 'CLIENTE'}\n
Bom dia,\n
Encaminhamos este chamado referente a uma falha na emissão de notas no ambiente ${ticketData.ambiente || '...'}.\n
**Dados do Emitente:**
* Empresa: ${ticketData.empresa || '...'}
* CNPJ: ${ticketData.cnpj || '...'}
* Município: ${ticketData.municipio || '...'}\n
**Descrição:**
O sistema retorna a mensagem: **${ticketData.erro || '...'}**.
${ticketData.descricao || ''}\n
Ações Realizadas: ${ticketData.acoes || 'Verificação de cadastro e schemas.'}
${ticketData.ticketAntigo ? 'Ticket Anterior: ' + ticketData.ticketAntigo : ''}\n
Não foi possível resolver internamente.`;
                setFinalMessage(texto);
            }, [ticketData]);

            const handleGerarTicket = async () => {
                const textoParaEnviar = finalMessage;

                if (!textoParaEnviar.trim()) {
                    alert("O campo de texto está vazio!");
                    return;
                }

                setTicketStatus('loading');
                try {
                    // Exemplo: 'https://seulink.ngrok-free.app/abrir_migrate'
                    const response = await fetch('http://localhost:5000/abrir_migrate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            empresa: ticketData.empresa || "GARAGE", 
                            conteudo: textoParaEnviar
                        })
                    });
                    const result = await response.json();
                    setTicketStatus('success');
                    alert(result.message || "Automação finalizada!");
                } catch (error) {
                    setTicketStatus('error');
                    alert("Erro ao conectar com o servidor Python.");
                    console.error(error);
                } finally {
                    setTimeout(() => setTicketStatus(null), 3000);
                }
            };

            useEffect(() => {
                if (view === 'verificacao') {
                    fetchMunicipios(searchMun);
                    fetchStats();
                }
            }, [view, filtroAderentes, filtroUF]); // Carrega ao entrar na aba ou ao mudar o filtro

            // Efeito de Animação para o Gráfico e Números
            useEffect(() => {
                if (stats.total === 0) return;
                
                let start = null;
                const duration = 2000; // 2 segundos de animação
                
                const animate = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 4); // EaseOutQuart (suave no final)
                    
                    setAnimStats({
                        total: Math.floor(stats.total * ease),
                        aderentes: Math.floor(stats.aderentes * ease),
                        naoAderentes: Math.floor(stats.naoAderentes * ease),
                        pct: (stats.aderentes / stats.total) * ease
                    });
                    
                    if (progress < 1) requestAnimationFrame(animate);
                };
                
                requestAnimationFrame(animate);
            }, [stats]);

            const handleSyncDatabase = async () => {
                if (municipiosTemp.length === 0) return alert("Carregue um CSV primeiro.");
                if (!confirm(`Deseja enviar ${municipiosTemp.length} registros para o banco de dados? Isso atualizará os dados existentes.`)) return;

                setSyncStatus('loading');
                try {
                    const response = await fetch('http://localhost:5000/sincronizar_municipios', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ municipios: municipiosTemp })
                    });
                    const result = await response.json();
                    if (response.ok) { setSyncStatus('success'); alert(result.message); }
                    else { throw new Error(result.error); }
                } catch (error) { setSyncStatus('error'); alert("Erro na sincronização: " + error.message); }
                finally { setSyncStatus(null); }
            };

            // Função auxiliar para ler dados ignorando maiúsculas/minúsculas
            const getVal = (obj, key) => {
                if (!obj) return '';
                // Tenta encontrar a chave exata ou em minúsculo
                return obj[key] || obj[key.toLowerCase()] || obj[key.toUpperCase()] || '';
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 dark:bg-slate-900 transition-colors duration-300 font-sans antialiased">
                    <header className="bg-[#2d3e50] dark:bg-slate-950 text-white shadow-lg p-3 px-4 md:p-4 md:px-6 flex items-center justify-between border-b-4 border-[#f59e0b] sticky top-0 z-[60] transition-colors">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                                {menuOpen ? <IconX /> : <IconMenu />}
                            </button>
                            <SoftcomLogo />
                        </div>
                        
                        <button onClick={toggleTheme} className="p-2 bg-white/10 hover:bg-white/20 rounded-full text-[#f59e0b] transition-all shadow-inner">
                            {darkMode ? <IconSun /> : <IconMoon />}
                        </button>
                    </header>

                    <div className={`fixed inset-y-0 left-0 w-64 bg-[#2d3e50] dark:bg-slate-950 shadow-2xl z-50 transform transition-transform duration-300 ease-in-out border-r border-slate-700 pt-24 ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-4 flex flex-col gap-2">
                            <button onClick={() => { setView('verificacao'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'verificacao' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconServer /> VERIFICAÇÃO AMBIENTE
                            </button>
                            <button onClick={() => { setView('erros_mapeados'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'erros_mapeados' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconSearch /> BASE DE SOLUÇÕES
                            </button>
                            <button onClick={() => { setView('gerar_ticket'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'gerar_ticket' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconTicket /> GERAR TICKET
                            </button>
                            <button onClick={() => { setView('mapear_erro'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'mapear_erro' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconPlus /> MAPEAR ERRO
                            </button>
                            <button onClick={() => { setView('links'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'links' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconExternalLink /> LINKS ÚTEIS
                            </button>
                            <div className="my-2 border-t border-slate-700"></div>
                            <button onClick={() => { setView('especialista'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'especialista' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconShield /> SETOR ESPECIALISTA
                            </button>
                        </nav>
                    </div>

                    {menuOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40" onClick={() => setMenuOpen(false)}></div>}

                    <main className="max-w-6xl mx-auto w-full p-3 md:p-8 flex-1 flex flex-col">
                        
                        {view === 'erros_mapeados' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 uppercase italic tracking-tighter leading-none">Base de Soluções</h2>
                                    </div>
                                    
                                    <div className="flex flex-col md:flex-row gap-4 w-full md:w-auto">
                                        {/* Dropdown de Filtro */}
                                        <div className="relative">
                                            <select 
                                                value={filterCategory} 
                                                onChange={(e) => setFilterCategory(e.target.value)}
                                                className="w-full md:w-48 h-full bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white font-bold rounded-2xl px-4 py-4 outline-none focus:border-[#f59e0b] appearance-none cursor-pointer shadow-sm transition-all"
                                            >
                                                <option value="">Todos os Sistemas</option>
                                                <option value="Softshop">Softshop</option>
                                                <option value="Invoicy">Invoicy</option>
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                            </div>
                                        </div>

                                        <div className="relative w-full max-w-md group">
                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#f59e0b] transition-colors pointer-events-none">
                                            <IconSearch />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={searchQuery} 
                                            onChange={(e) => setSearchQuery(e.target.value)} 
                                            placeholder="Buscar erro, código ou solução..." 
                                            className="w-full md:w-80 pl-14 pr-12 py-4 bg-white dark:bg-slate-800 dark:border-slate-700 dark:text-white border-2 border-slate-200 rounded-2xl outline-none focus:border-[#f59e0b] focus:shadow-lg font-bold shadow-sm transition-all placeholder:font-medium placeholder:text-slate-400" 
                                        />
                                        {searchQuery && (
                                            <button 
                                                onClick={() => setSearchQuery('')}
                                                className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 dark:hover:text-white bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 p-1.5 rounded-full transition-all animate-fadeIn"
                                                title="Limpar busca"
                                            >
                                                <div className="transform scale-75"><IconX /></div>
                                            </button>
                                        )}
                                    </div>
                                    </div>
                                </div>
                                {loading ? (
                                    <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-[#f59e0b] border-t-transparent rounded-full animate-spin"></div></div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {filteredErrors.map((item, index) => (
                                            <div key={item.id} onClick={() => setSelectedError(item)} style={{ animationDelay: `${index * 50}ms` }} className="animate-slideUpFade group relative bg-white dark:bg-slate-800 rounded-3xl shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col h-full cursor-pointer">
                                                {/* Acento Superior */}
                                                <div className="h-1.5 w-full bg-gradient-to-r from-[#f59e0b] to-amber-200"></div>
                                                
                                                <div className="p-4 md:p-6 flex flex-col flex-1">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`p-3 rounded-2xl transition-colors duration-300 shadow-sm ${item.categoria === 'Invoicy' ? 'bg-indigo-50 text-indigo-500 group-hover:bg-indigo-500 group-hover:text-white' : 'bg-slate-50 text-slate-400 group-hover:bg-[#f59e0b] group-hover:text-white'}`}>
                                                                <IconFileText />
                                                            </div>
                                                            {item.categoria && (
                                                                <span className={`text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-full border ${item.categoria === 'Invoicy' ? 'bg-indigo-50 text-indigo-500 border-indigo-100' : 'bg-orange-50 text-orange-500 border-orange-100'}`}>
                                                                    {item.categoria}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className="flex gap-1">
                                                            {item.video_url && <div className="text-emerald-500 bg-emerald-50 p-2 rounded-xl" title="Possui vídeo"><IconVideo /></div>}
                                                            <button onClick={(e) => { e.stopPropagation(); openEditModal(item); }} className="text-slate-300 hover:text-[#f59e0b] p-2 hover:bg-slate-50 rounded-xl transition-all"><IconEdit /></button>
                                                            <button onClick={(e) => { e.stopPropagation(); deleteError(item.id); }} className="text-slate-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-xl transition-all"><IconTrash /></button>
                                                        </div>
                                                    </div>
                                                    
                                                    <h3 className="text-slate-800 dark:text-slate-100 font-bold text-lg mb-3 line-clamp-2 leading-tight group-hover:text-[#f59e0b] transition-colors">{item.erro}</h3>
                                                    <p className="text-slate-500 dark:text-slate-400 text-xs font-medium line-clamp-3 mb-6 flex-1 leading-relaxed opacity-80">{item.solucao}</p>
                                                    
                                                    <div className="flex items-center justify-between pt-4 border-t border-slate-50 mt-auto">
                                                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-[#f59e0b] transition-colors">Ver Detalhes</span>
                                                        <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-[#f59e0b] group-hover:text-white transition-all transform group-hover:translate-x-1">
                                                            <IconArrowRight />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}


                        {view === 'verificacao' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <div>
                                            <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 uppercase italic tracking-tighter leading-none">Consultar Municípios</h2>
                                            <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">{filtroUF ? `Panorama - ${filtroUF}` : 'Base de Dados Nacional'}</p>
                                        </div>
                                    </div>

                                    <form onSubmit={(e) => { e.preventDefault(); setMostrarSugestoes(false); fetchMunicipios(searchMun); }} className="flex gap-4 w-full md:w-auto relative">
                                        <div className="relative w-full md:w-80">
                                            <input 
                                                type="text" 
                                                value={searchMun}
                                                onChange={(e) => setSearchMun(e.target.value)}
                                                onKeyDown={handleKeyDown}
                                                onFocus={() => { if(searchMun.length >= 2) setMostrarSugestoes(true); }}

                                                )}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'mapear_erro' && (
                            <div className="animate-fadeIn w-full max-w-5xl mx-auto">
                                <div className="mb-8 flex items-center justify-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg transform -rotate-6"><IconPlus /></div>
                                    <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 uppercase italic tracking-tighter leading-none">Catalogar Nova Solução</h2>
                                </div>
                                
                                <form onSubmit={handleSaveError} className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                    {/* Lado Esquerdo: O Problema (Dark Theme) */}
                                    <div className="bg-[#2d3e50] p-5 md:p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden group">
                                        {/* Efeito visual de fundo */}
                                        <div className="absolute top-0 right-0 p-32 bg-[#f59e0b] rounded-full blur-[100px] opacity-10 group-hover:opacity-20 transition-opacity"></div>
                                        
                                        <h3 className="text-[#f59e0b] font-black uppercase text-xs tracking-widest mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                                            <IconX /> O Problema
                                        </h3>
                                        
                                        <div className="space-y-6 relative z-10">
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-2 block tracking-widest">Sistema</label>
                                                <div className="flex bg-slate-800/50 p-1 rounded-xl border border-slate-700">
                                                    <button type="button" onClick={() => setCategoryInput('Softshop')} className={`flex-1 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${categoryInput === 'Softshop' ? 'bg-[#f59e0b] text-[#2d3e50] shadow-lg' : 'text-slate-400 hover:bg-slate-700'}`}>Softshop</button>
                                                    <button type="button" onClick={() => setCategoryInput('Invoicy')} className={`flex-1 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${categoryInput === 'Invoicy' ? 'bg-indigo-500 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-700'}`}>Invoicy</button>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-2 block tracking-widest">Mensagem de Erro</label>
                                                <RichInput required rows={4} value={errorInput} onChange={(e) => setErrorInput(e.target.value)} placeholder="Cole aqui a mensagem de erro exata..." className="w-full p-3 md:p-4 bg-slate-800/50 border border-slate-700 rounded-2xl text-white placeholder-slate-500 outline-none focus:border-[#f59e0b] transition-all font-medium custom-scrollbar resize-none shadow-inner" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-2 block tracking-widest">Evidência em Vídeo (URL)</label>
                                                <div className="relative">
                                                    <input value={videoInput} onChange={(e) => setVideoInput(e.target.value)} placeholder="https://..." className="w-full p-3 md:p-4 pl-12 bg-slate-800/50 border border-slate-700 rounded-2xl text-white placeholder-slate-500 outline-none focus:border-[#f59e0b] transition-all font-medium" />
                                                    <div className="absolute left-4 top-4 text-slate-500"><IconVideo /></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Lado Direito: A Solução (Light Theme) */}
                                    <div className="flex flex-col gap-6 h-full">
                                        <div className="bg-white dark:bg-slate-800 p-5 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-700 flex-1 flex flex-col min-h-[300px] transition-colors">
                                            <h3 className="text-emerald-500 font-black uppercase text-xs tracking-widest mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
                                                <IconCheck /> A Solução Técnica
                                            </h3>
                                            <RichInput required value={solutionInput} onChange={(e) => setSolutionInput(e.target.value)} placeholder="Descreva o procedimento passo a passo aqui..." className="flex-1 w-full p-2 bg-transparent border-none outline-none text-slate-600 dark:text-slate-300 font-medium text-lg leading-relaxed resize-none custom-scrollbar placeholder-slate-300" />
                                        </div>
                                        
                                        <button type="submit" disabled={saveStatus === 'loading'} className="w-full bg-gradient-to-r from-[#2d3e50] to-[#1e293b] text-white font-black py-5 rounded-2xl hover:shadow-2xl hover:-translate-y-1 active:scale-95 duration-200 transition-all uppercase tracking-widest shadow-lg flex items-center justify-center gap-3">
                                            {saveStatus === 'loading' ? (
                                                <>Processando...</> 
                                            ) : (
                                                <>
                                                    <IconCloudUpload /> Gravar na Base de Dados
                                                </>
                                            )}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {view === 'links' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconExternalLink /></div>
                                    <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 uppercase italic tracking-tighter leading-none">Links & Portais Úteis</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {linksUteis.map((link, idx) => (
                                        <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" style={{ animationDelay: `${idx * 75}ms` }} className="animate-slideUpFade bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:border-[#f59e0b] hover:shadow-md hover:-translate-y-1 transition-all group flex items-center gap-4">
                                            <div className="w-12 h-12 flex-shrink-0 bg-gradient-to-br from-[#f59e0b] to-amber-300 rounded-xl text-white flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform duration-300">
                                                {link.icon}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className="text-lg font-black text-slate-700 dark:text-slate-100 uppercase italic tracking-tight truncate group-hover:text-[#f59e0b] transition-colors">{link.title}</h3>
                                                <p className="text-slate-400 text-[10px] font-bold truncate">{link.description}</p>
                                            </div>
                                            <div className="text-slate-300 group-hover:text-[#f59e0b] transition-colors">
                                                <IconExternalLink />
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'especialista' && (
                            <div className="animate-fadeIn flex flex-col items-center justify-center w-full flex-1">
                                {!isEspecialistaAuthed ? (
                                    <div className="bg-[#2d3e50] p-12 rounded-[3rem] shadow-2xl border-4 border-[#f59e0b] w-full max-w-sm text-center relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
                                        <div className="relative z-10">
                                            <div className="mb-8 flex justify-center"><div className="bg-white/10 p-8 rounded-full text-[#f59e0b] backdrop-blur-sm"><IconShield /></div></div>
                                            <h2 className="text-2xl font-black text-white uppercase italic tracking-tighter mb-2 leading-none">Área Restrita</h2>
                                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-10">Apenas Pessoal Autorizado</p>
                                            <input type="password" maxLength="4" value={pinInput} onChange={(e) => { setPinInput(e.target.value); if(e.target.value === '7711') setIsEspecialistaAuthed(true); }} placeholder="PIN" className="w-full text-center text-3xl md:text-5xl p-6 bg-slate-800/50 border-2 rounded-2xl outline-none border-slate-600 focus:border-[#f59e0b] text-white tracking-[0.4em] font-black placeholder-slate-600 transition-all" autoFocus />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="w-full space-y-10 animate-fadeIn">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-emerald-500 p-3 rounded-2xl text-white shadow-lg"><IconShield /></div>
                                            <h2 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 uppercase italic tracking-tighter leading-none tracking-tighter">Credenciais Master</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {credenciais.map((c, i) => (
                                                <div key={i} className="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-xl border-t-[10px] border-[#f59e0b] flex flex-col gap-6 transition-colors">
                                                    <h3 className="text-slate-800 dark:text-slate-100 font-black uppercase italic tracking-tighter text-2xl mb-2">{c.portal}</h3>
                                                    <div className="space-y-5">
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-1 leading-none">Login</p>
                                                            <div className="flex items-center justify-between bg-slate-50 dark:bg-slate-700 p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-600">
                                                                <span className="font-bold text-slate-600 dark:text-slate-200 truncate mr-4">{c.user}</span>
                                                                <button onClick={() => copyToClipboard(c.user, `u_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`u_${i}`] ? 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-1 leading-none">Password</p>
                                                            <div className="flex items-center justify-between bg-slate-50 dark:bg-slate-700 p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-600">
                                                                <span className="font-mono font-bold text-slate-600">••••••••</span>
                                                                <button onClick={() => copyToClipboard(c.pass, `p_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`p_${i}`] ? 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* --- MODAL DETALHES COM PLAYER --- */}
                    {selectedError && (
                        <div className="fixed inset-0 z-[100] bg-white dark:bg-slate-900 animate-slideUpFade flex flex-col transition-colors">
                            <div className="w-full h-full flex flex-col relative overflow-hidden">
                                
                                {/* Header com Gradiente */}
                                <div className="relative bg-slate-50 dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 p-5 md:p-10 flex justify-between items-start flex-shrink-0">
                                    <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#f59e0b] to-amber-200"></div>
                                    
                                    <div className="pr-10 w-full">
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className="bg-[#f59e0b]/10 text-[#f59e0b] px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-[#f59e0b]/20 shadow-sm">
                                                Solução Catalogada
                                            </span>
                                            {selectedError.categoria && (
                                                <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border shadow-sm ${selectedError.categoria === 'Invoicy' ? 'bg-indigo-50 text-indigo-500 border-indigo-200' : 'bg-orange-50 text-orange-500 border-orange-200'}`}>
                                                    {selectedError.categoria}
                                                </span>
                                            )}
                                        </div>
                                        <h2 className="text-xl md:text-3xl font-black text-[#2d3e50] dark:text-white tracking-tight leading-snug break-words max-h-60 overflow-y-auto custom-scrollbar pr-4">
                                            {selectedError.erro}
                                        </h2>
                                    </div>
                                    
                                    <button onClick={() => setSelectedError(null)} className="p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-500 hover:text-white hover:bg-red-500 hover:border-red-500 transition-all shadow-sm flex-shrink-0 group">
                                        <div className="group-hover:rotate-90 transition-transform duration-300"><IconX /></div>
                                    </button>
                                </div>

                                {/* Conteúdo Central */}
                                <div className="flex-1 overflow-y-auto custom-scrollbar bg-white dark:bg-slate-900 p-4 md:p-12 space-y-8 md:space-y-10">
                                    
                                    {selectedError.video_url && (
                                        <div className="bg-slate-950 rounded-3xl p-1.5 shadow-xl overflow-hidden group max-w-4xl mx-auto border border-slate-800">
                                             <div className="bg-slate-800/50 px-4 py-3 flex items-center justify-between text-white/50 text-[10px] font-bold uppercase tracking-widest border-b border-white/5 mb-0.5">
                                                <div className="flex items-center gap-2"><IconVideo /> Demonstração em Vídeo</div>
                                                <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                                            </div>
                                            <div className="relative aspect-video bg-black rounded-2xl overflow-hidden">
                                                <video controls playsInline preload="metadata" className="w-full h-full object-contain">
                                                    <source src={selectedError.video_url} type="video/mp4" />
                                                    Navegador incompatível.
                                                </video>
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2 ml-1">
                                            <IconFileText /> Procedimento Técnico
                                        </h3>
                                        <div className="bg-slate-50 dark:bg-slate-950 p-4 md:p-10 rounded-3xl border border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-300 font-medium text-base md:text-lg leading-relaxed shadow-inner">
                                            <SolutionViewer text={selectedError.solucao} />
                                        </div>
                                    </div>
                                </div>

                                {/* Footer de Ações */}
                                <div className="p-4 md:p-8 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 flex items-center gap-3 md:gap-4 z-10 safe-area-bottom">
                                    <button 
                                        onClick={() => openEditModal(selectedError)} 
                                        className="p-3 md:p-4 rounded-xl border-2 border-slate-100 dark:border-slate-600 text-slate-400 font-bold hover:border-[#f59e0b] hover:text-[#f59e0b] hover:bg-[#f59e0b]/5 transition-all flex items-center gap-2 uppercase text-[10px] tracking-widest shrink-0"
                                        title="Editar Solução"
                                    >
                                        <IconEdit /> <span className="hidden sm:inline">Editar</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => copyToClipboard(selectedError.solucao, `m_${selectedError.id}`)} 
                                        className={`flex-1 p-3 md:p-4 rounded-xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 transition-all shadow-lg hover:-translate-y-0.5 ${
                                            copyStatus[`m_${selectedError.id}`] 
                                            ? 'bg-emerald-500 text-white shadow-emerald-200' 
                                            : 'bg-[#2d3e50] text-white shadow-slate-200 hover:bg-[#1a2530]'
                                        }`}
                                    >
                                        <IconClipboard width="18" height="18" /> 
                                        {copyStatus[`m_${selectedError.id}`] ? "CONTEÚDO COPIADO!" : "COPIAR RESOLUÇÃO"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL EDIÇÃO COM CAMPO VÍDEO --- */}
                    {editingError && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-xl animate-fadeIn">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-2xl mx-0 md:mx-4 rounded-[3rem] shadow-2xl overflow-hidden animate-modalIn max-h-[90vh] flex flex-col transition-colors" onClick={e => e.stopPropagation()}>
                                <div className="bg-[#2d3e50] p-8 border-b-4 border-[#f59e0b] flex justify-between items-center text-white flex-shrink-0">
                                    <h3 className="text-xl font-black italic uppercase tracking-tighter leading-none">Editar Mapeamento</h3>
                                    <button onClick={() => setEditingError(null)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><IconX /></button>
                                </div>
                                <form onSubmit={handleUpdateError} className="p-5 md:p-10 space-y-6 bg-slate-50 dark:bg-slate-900 overflow-y-auto custom-scrollbar">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Sistema</label>
                                        <div className="flex bg-white dark:bg-slate-800 p-1 rounded-xl border border-slate-200 dark:border-slate-700">
                                            <button type="button" onClick={() => setEditCategoryInput('Softshop')} className={`flex-1 py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${editCategoryInput === 'Softshop' ? 'bg-[#f59e0b] text-[#2d3e50] shadow-md' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>Softshop</button>
                                            <button type="button" onClick={() => setEditCategoryInput('Invoicy')} className={`flex-1 py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${editCategoryInput === 'Invoicy' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'}`}>Invoicy</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Erro</label>
                                        <RichInput required rows={2} value={editErrorInput} onChange={(e) => setEditErrorInput(e.target.value)} className="w-full p-3 md:p-5 bg-white dark:bg-slate-800 dark:text-white dark:border-slate-700 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Solução</label>
                                        <RichInput required rows={6} value={editSolutionInput} onChange={(e) => setEditSolutionInput(e.target.value)} className="w-full p-3 md:p-5 bg-white dark:bg-slate-800 dark:text-white dark:border-slate-700 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 mb-2 leading-none">Link Vídeo (Azure)</label>
                                        <input value={editVideoInput} onChange={(e) => setEditVideoInput(e.target.value)} className="w-full p-3 md:p-5 bg-white dark:bg-slate-800 dark:text-white dark:border-slate-700 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] font-bold" />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button type="button" onClick={() => setEditingError(null)} className="flex-1 py-5 bg-slate-200 text-slate-600 font-black rounded-2xl uppercase text-xs tracking-widest transition-colors hover:bg-slate-300">Descartar</button>
                                        <button type="submit" className="flex-[2] py-5 bg-[#f59e0b] text-[#2d3e50] font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl transition-all">
                                            {saveStatus === 'loading' ? 'A GRAVAR...' : 'SALVAR ALTERAÇÕES'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="text-center p-8 text-slate-400 text-[10px] font-black uppercase italic tracking-widest leading-none tracking-tighter opacity-50">
                        Softcom Tecnologia &copy; {new Date().getFullYear()} • Suporte NFSe Cloud
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
