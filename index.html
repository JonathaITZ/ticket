<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softcom - Assistente NFSe</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .softcom-italic { font-style: italic; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2d3e50; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-modalIn { animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        #root { min-height: 100vh; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-[#2d3e50]">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-t-[#f59e0b] border-slate-600 rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-white font-bold italic tracking-tighter uppercase text-xs">A carregar Assistente Softcom...</p>
            </div>
        </div>
    </div>

    <script type="text/babel" data-presets="react" data-type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js';

        const { useState, useEffect, useMemo } = React;

        const SUPABASE_URL = 'https://jlmqkrqesfmfrjkawwtf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsbXFrcnFlc2ZtZnJqa2F3d3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MzU4OTgsImV4cCI6MjA4ODIxMTg5OH0.wKERk4oDm7XJhGoq1TnsMJ1IK8hbHefJXJdCb1XKsLE';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- Ícones ---
        const IconHelp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconClipboard = ({ width = "14", height = "14" }) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;

        const IconNfseGov = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <path d="M12 18v-6"></path>
                <path d="m9 15 3 3 3-3"></path>
            </svg>
        );

        const IconDashboard = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="11" width="7" height="10"></rect>
                <rect x="3" y="15" width="7" height="6"></rect>
            </svg>
        );

        const IconPortal = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        );

        const IconSupport = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        );

        const SoftcomLogo = ({ size = "45" }) => (
            <div className="flex items-center gap-2">
                <svg width={size} height={(size * 35)/45} viewBox="0 0 45 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 8C4 6.89543 4.89543 6 6 6H16.5L19.5 9H39C40.1046 9 41 9.89543 41 11V13H4V8Z" fill="#EAB308" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                    <path d="M2 12C2 10.8954 2.89543 10 4 10H41C42.1046 10 43 10.8954 43 12V28C43 29.1046 42.1046 30 41 30H4C2.89543 30 2 29.1046 2 28V12Z" fill="#FBCC14" stroke="black" strokeWidth="2.5" strokeLinejoin="round"/>
                </svg>
                <span className="text-3xl font-black italic tracking-tighter text-white select-none softcom-italic" style={{ letterSpacing: '-0.08em' }}>
                    softcom
                </span>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('analise');
            const [menuOpen, setMenuOpen] = useState(false);
            const [currentStep, setCurrentStep] = useState('inicio');
            const [flowHistory, setFlowHistory] = useState([]);
            const [mappedErrors, setMappedErrors] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedError, setSelectedError] = useState(null);
            const [editingError, setEditingError] = useState(null);
            const [loading, setLoading] = useState(false);
            const [errorInput, setErrorInput] = useState('');
            const [solutionInput, setSolutionInput] = useState('');
            const [saveStatus, setSaveStatus] = useState(null);
            const [copyStatus, setCopyStatus] = useState({});
            const [editErrorInput, setEditErrorInput] = useState('');
            const [editSolutionInput, setEditSolutionInput] = useState('');
            const [isEspecialistaAuthed, setIsEspecialistaAuthed] = useState(false);
            const [pinInput, setPinInput] = useState('');

            // --- LINKS ÚTEIS ---
            const linksUteis = [
                { title: "Verificação de Ambiente Migrate", desc: "Portal para verificação técnica de ambientes.", url: "https://painel-dfe-production-382497636524.us-central1.run.app/", icon: <IconDashboard /> },
                { title: "Portal Invoicy", desc: "Acesso ao emissor Invoicy.", url: "https://web.invoicy.com.br/login.aspx", icon: <IconPortal /> },
                { title: "Atendimento Migrate", desc: "Portal de suporte técnico Migrate.", url: "https://atendimento.migrate.com.br/Account/Login", icon: <IconSupport /> },
                { title: "Portal NFS-e Nacional (XML)", desc: "Aceder para descarregar XML caso o cliente use o ambiente nacional.", url: "https://www.nfse.gov.br/EmissorNacional/Login?ReturnUrl=%2FEmissorNacional", icon: <IconNfseGov /> }
            ];

            // --- CREDENCIAIS ATUALIZADAS ---
            const credenciais = [
                { portal: "Invoicy", user: "renato.rodrigues@softcomtecnologia.com.br", pass: "Softcom12" },
                { portal: "Migrate", user: "suporte.nfse.softcom@gmail.com", pass: "Sfc@3321" }
            ];

            // --- FLUXOGRAMA ---
            const flowchart = {
                inicio: {
                    question: "O cliente já emite NFS-e pelo sistema?",
                    options: [{ label: "Sim", next: "cliente_desktop_web" }, { label: "Não", next: "solicitar_xml_pdf" }]
                },
                solicitar_xml_pdf: {
                    instruction: "Peça ao cliente o XML de uma nota teste e o PDF emitido este ano na prefeitura.",
                    question: "Arquivos recebidos?",
                    options: [{ label: "Sim", next: "comparar_dados" }, { label: "Não", next: "solicitar_xml_pdf" }]
                },
                comparar_dados: {
                    instruction: "Compare os dados da nota do sistema com a nota teste e deixe os dados do serviço iguais.",
                    question: "O ajuste resolveu o problema?",
                    options: [{ label: "Sim", next: "fim_sucesso" }, { label: "Não", next: "cliente_desktop_web" }]
                },
                cliente_desktop_web: {
                    question: "Qual o ambiente do cliente?",
                    options: [{ label: "Desktop", next: "subindo_migrate_desktop" }, { label: "Web", next: "subindo_migrate_web" }]
                },
                subindo_migrate_desktop: {
                    question: "A nota está a subir para o monitor da Migrate?",
                    options: [{ label: "Sim", next: "foi_autorizada" }, { label: "Não", next: "verificar_versao_emissor" }]
                },
                verificar_versao_emissor: {
                    instruction: "Verifique a versão do emissor de notas e valide se está atualizado.",
                    question: "Versão verificada?",
                    options: [{ label: "Sim, Próximo", next: "refazer_pedido_zero_desktop" }]
                },
                refazer_pedido_zero_desktop: {
                    instruction: "Refaça o pedido do zero no sistema e tente emitir a nota novamente.",
                    question: "Resolveu o problema?",
                    options: [{ label: "Sim", next: "fim_sucesso" }, { label: "Não", next: "versao_inferior_910" }]
                },
                versao_inferior_910: {
                    question: "A versão do sistema é inferior a 9.10?",
                    options: [{ label: "Sim", next: "passar_atualizador" }, { label: "Não", next: "reconfigurar_emissor_zero" }]
                },
                passar_atualizador: {
                    instruction: "Execute o atualizador de versões no sistema do cliente.",
                    isEnd: true, type: "action", title: "Fim - Atualizar Versões"
                },
                subindo_migrate_web: {
                    question: "A nota está a subir para o monitor da Migrate?",
                    options: [{ label: "Sim", next: "foi_autorizada" }, { label: "Não", next: "refazer_pedido_zero_web" }]
                },
                refazer_pedido_zero_web: {
                    instruction: "Refaça o pedido do zero no sistema e tente emitir a nota novamente.",
                    question: "Resolveu o problema?",
                    options: [{ label: "Sim", next: "fim_sucesso" }, { label: "Não", next: "reconfigurar_emissor_zero" }]
                },
                reconfigurar_emissor_zero: {
                    instruction: "Reconfigure as definições do emissor NFSe do zero.",
                    question: "Reconfigurado?",
                    options: [{ label: "Sim, Próximo", next: "limpar_tabela_config" }]
                },
                limpar_tabela_config: {
                    instruction: "Na tabela 'softcom_modulo_configurações', apague os dados da NFSe. Reconfigure e teste novamente.",
                    question: "A nota subiu agora para a Migrate?",
                    options: [{ label: "Sim", next: "foi_autorizada" }, { label: "Não", next: "abrir_ticket_migrate" }]
                },
                foi_autorizada: {
                    question: "A nota foi autorizada na prefeitura?",
                    options: [{ label: "Sim", next: "fim_sucesso" }, { label: "Não (Rejeitada)", next: "verificar_erro_exibe" }]
                },
                verificar_erro_exibe: {
                    instruction: "Analise o erro exibido no monitor da Migrate. Utilize o GPT, Google ou a Base de Soluções.",
                    question: "Conseguiu resolver com o ajuste técnico?",
                    options: [{ label: "Sim", next: "fim_sucesso" }, { label: "Não", next: "abrir_ticket_migrate" }]
                },
                abrir_ticket_migrate: {
                    instruction: "Abra um ticket com a Migrate relatando o incidente.",
                    isEnd: true, type: "action", title: "Fim - Abrir Ticket"
                },
                fim_sucesso: {
                    instruction: "Excelente! O problema foi resolvido com sucesso.",
                    isEnd: true, type: "success", title: "Fim - Resolvido"
                }
            };

            const fetchErrors = async () => {
                setLoading(true);
                const { data, error } = await supabase.from('mapped_errors').select('*').order('created_at', { ascending: false });
                if (data) setMappedErrors(data);
                setLoading(false);
            };

            useEffect(() => { fetchErrors(); }, []);

            const openEditModal = (item) => {
                setEditErrorInput(item.erro);
                setEditSolutionInput(item.solucao);
                setEditingError(item);
            };

            const handleUpdateError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').update({ 
                    erro: editErrorInput, 
                    solucao: editSolutionInput 
                }).eq('id', editingError.id);
                
                if (error) {
                    setSaveStatus('error');
                } else {
                    setSaveStatus('success');
                    fetchErrors();
                    setTimeout(() => {
                        setSaveStatus(null);
                        setEditingError(null);
                        if(selectedError && selectedError.id === editingError.id) {
                            setSelectedError({...selectedError, erro: editErrorInput, solucao: editSolutionInput});
                        }
                    }, 1000);
                }
            };

            const handleSaveError = async (e) => {
                e.preventDefault();
                setSaveStatus('loading');
                const { error } = await supabase.from('mapped_errors').insert([{ erro: errorInput, solucao: solutionInput }]);
                if (error) setSaveStatus('error');
                else {
                    setSaveStatus('success');
                    setErrorInput(''); setSolutionInput('');
                    fetchErrors();
                    setTimeout(() => { setSaveStatus(null); setView('erros_mapeados'); }, 1500);
                }
            };

            const deleteError = async (id) => {
                if (!confirm("Remover permanentemente esta solução?")) return;
                await supabase.from('mapped_errors').delete().eq('id', id);
                fetchErrors();
            };

            const filteredErrors = useMemo(() => {
                if (!searchQuery) return mappedErrors;
                const q = searchQuery.toLowerCase();
                return mappedErrors.filter(e => e.erro.toLowerCase().includes(q) || e.solucao.toLowerCase().includes(q));
            }, [mappedErrors, searchQuery]);

            const copyToClipboard = (text, key) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopyStatus(prev => ({ ...prev, [key]: true }));
                setTimeout(() => setCopyStatus(prev => ({ ...prev, [key]: false })), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-100 font-sans antialiased">
                    <header className="bg-[#2d3e50] text-white shadow-lg p-4 px-6 flex items-center justify-between border-b-4 border-[#f59e0b] sticky top-0 z-[60]">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setMenuOpen(!menuOpen)} className="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                                {menuOpen ? <IconX /> : <IconMenu />}
                            </button>
                            <SoftcomLogo />
                        </div>
                        <div className="hidden md:flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span className="text-slate-400 text-[10px] font-black uppercase tracking-widest leading-none tracking-tighter">Database Cloud</span>
                        </div>
                    </header>

                    <div className={`fixed inset-y-0 left-0 w-64 bg-[#2d3e50] shadow-2xl z-50 transform transition-transform duration-300 ease-in-out border-r border-slate-700 pt-24 ${menuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-4 flex flex-col gap-2">
                            <button onClick={() => { setView('analise'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'analise' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconHelp /> ASSISTENTE NFSE
                            </button>
                            <button onClick={() => { setView('erros_mapeados'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'erros_mapeados' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconSearch /> BASE DE SOLUÇÕES
                            </button>
                            <button onClick={() => { setView('mapear_erro'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'mapear_erro' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconPlus /> MAPEAR ERRO
                            </button>
                            <button onClick={() => { setView('links'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'links' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconExternalLink /> LINKS ÚTEIS
                            </button>
                            <div className="my-2 border-t border-slate-700"></div>
                            <button onClick={() => { setView('especialista'); setMenuOpen(false); }} className={`flex items-center gap-3 p-3 rounded-lg text-sm font-bold transition-all ${view === 'especialista' ? 'bg-[#f59e0b] text-[#2d3e50]' : 'text-slate-300 hover:bg-slate-700'}`}>
                                <IconShield /> SETOR ESPECIALISTA
                            </button>
                        </nav>
                    </div>

                    {menuOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40" onClick={() => setMenuOpen(false)}></div>}

                    <main className="max-w-6xl mx-auto w-full p-4 md:p-8 flex-1 flex flex-col">
                        
                        {view === 'analise' && (
                            <div className="animate-fadeIn max-w-2xl mx-auto w-full space-y-8">
                                <div className="text-center">
                                    <h1 className="text-3xl font-black text-slate-800 italic uppercase leading-none tracking-tighter">Assistente NFSe</h1>
                                    <p className="text-slate-500 font-medium italic uppercase text-[10px]">Diagnóstico Softcom</p>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden min-h-[420px] flex flex-col">
                                    <div className="h-2 bg-slate-100 w-full"><div className="h-full bg-[#f59e0b] transition-all duration-500" style={{ width: `${(flowHistory.length / 14) * 100}%` }}></div></div>
                                    <div className="p-8 md:p-12 flex-1 flex flex-col justify-center items-center text-center">
                                        {flowchart[currentStep].instruction && (
                                            <div className="bg-amber-50 border-l-4 border-[#f59e0b] p-6 rounded-r-xl w-full mb-8 text-left animate-fadeIn">
                                                <h3 className="text-amber-800 font-black uppercase text-[10px] mb-1 tracking-widest italic leading-none">Ação Requerida:</h3>
                                                <p className="text-slate-700 text-lg font-bold leading-tight">{flowchart[currentStep].instruction}</p>
                                            </div>
                                        )}
                                        {!flowchart[currentStep].isEnd ? (
                                            <div className="space-y-8 w-full animate-fadeIn">
                                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 italic uppercase leading-tight tracking-tighter">{flowchart[currentStep].question}</h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {flowchart[currentStep].options.map((opt, i) => (
                                                        <button key={i} onClick={() => { setFlowHistory([...flowHistory, currentStep]); setCurrentStep(opt.next); }} className="group flex items-center justify-between p-6 bg-slate-50 border-2 border-slate-200 rounded-2xl hover:border-[#f59e0b] hover:bg-amber-50 transition-all text-left">
                                                            <span className="text-lg font-bold text-[#2d3e50] group-hover:text-amber-900 leading-tight">{opt.label}</span>
                                                            <div className="bg-white p-2 rounded-full shadow-sm group-hover:bg-[#f59e0b] transition-colors"><IconArrowRight /></div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="animate-fadeIn flex flex-col items-center text-center space-y-6">
                                                <div className={`p-8 rounded-full ${flowchart[currentStep].type === 'success' ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-100 text-[#2d3e50]'} border-4 border-white shadow-xl`}>
                                                    {flowchart[currentStep].type === 'success' ? <IconCheck /> : <IconShield />}
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">{flowchart[currentStep].title}</h2>
                                                <button onClick={() => { setFlowHistory([]); setCurrentStep('inicio'); }} className="bg-slate-200 text-slate-600 px-10 py-4 rounded-full font-black hover:bg-slate-300 transition-all uppercase tracking-widest text-[10px]">Novo Diagnóstico</button>
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 p-4 border-t flex justify-between px-8 text-[10px] font-black uppercase tracking-widest">
                                        <button onClick={() => { if(flowHistory.length > 0) { const prev = flowHistory[flowHistory.length - 1]; setFlowHistory(flowHistory.slice(0, -1)); setCurrentStep(prev); } }} disabled={flowHistory.length === 0} className="text-slate-400 disabled:opacity-0 hover:text-slate-600 flex items-center gap-1">← Voltar</button>
                                        <button onClick={() => { setFlowHistory([]); setCurrentStep('inicio'); }} className="text-slate-400 hover:text-red-500">Reiniciar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'erros_mapeados' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconSearch /></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Base de Soluções</h2>
                                    </div>
                                    <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Pesquisar..." className="w-full max-w-md px-6 py-4 bg-white border-2 border-slate-200 rounded-2xl outline-none focus:border-[#f59e0b] font-bold shadow-sm" />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredErrors.map((item) => (
                                        <div key={item.id} className="bg-white rounded-[2.5rem] shadow-md border-2 border-transparent hover:border-[#f59e0b] transition-all p-6 flex flex-col group h-full cursor-pointer" onClick={() => setSelectedError(item)}>
                                            <div className="flex justify-between mb-4">
                                                <div className="bg-slate-50 p-2.5 rounded-xl text-[#2d3e50] group-hover:bg-[#f59e0b]/10 group-hover:text-[#f59e0b] transition-colors"><IconFileText /></div>
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); openEditModal(item); }} 
                                                        className="text-slate-400 hover:text-[#f59e0b] p-2 bg-slate-50 rounded-lg hover:bg-amber-50 transition-all"
                                                    >
                                                        <IconEdit />
                                                    </button>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); deleteError(item.id); }} 
                                                        className="text-slate-400 hover:text-red-500 p-2 bg-slate-50 rounded-lg hover:bg-red-50 transition-all"
                                                    >
                                                        <IconTrash />
                                                    </button>
                                                </div>
                                            </div>
                                            <h3 className="text-[#2d3e50] font-black uppercase text-xs italic tracking-tight mb-4 line-clamp-3 border-l-4 border-slate-100 group-hover:border-[#f59e0b] pl-3 leading-tight transition-all">
                                                {item.erro}
                                            </h3>
                                            <div className="mt-auto pt-4 border-t text-[10px] font-black text-[#f59e0b] uppercase tracking-widest flex items-center justify-between">
                                                <span>Ver Solução Completa</span>
                                                <IconArrowRight />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'mapear_erro' && (
                            <div className="animate-fadeIn max-w-2xl mx-auto w-full">
                                <div className="mb-8 flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconPlus /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none">Mapear Novo Erro</h2>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 md:p-10">
                                    <form onSubmit={handleSaveError} className="space-y-8">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-3 leading-none tracking-widest">Rejeição Detectada</label>
                                            <textarea required rows="3" value={errorInput} onChange={(e) => setErrorInput(e.target.value)} placeholder="Cole aqui a mensagem de erro..." className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold text-slate-700" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-3 leading-none tracking-widest">Solução Técnica</label>
                                            <textarea required rows="8" value={solutionInput} onChange={(e) => setSolutionInput(e.target.value)} placeholder="Descreva o passo a passo da correção..." className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#f59e0b] transition-all font-bold text-slate-700" />
                                        </div>
                                        <button type="submit" disabled={saveStatus === 'loading'} className="w-full bg-[#2d3e50] text-white font-black py-6 rounded-2xl hover:bg-slate-800 transition-all uppercase tracking-widest shadow-xl">
                                            {saveStatus === 'loading' ? 'A PROCESSAR...' : 'GRAVAR SOLUÇÃO'}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {view === 'links' && (
                            <div className="animate-fadeIn w-full space-y-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-[#f59e0b] p-3 rounded-2xl text-[#2d3e50] shadow-lg"><IconExternalLink /></div>
                                    <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none tracking-tighter">Links & Portais Úteis</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                                    {linksUteis.map((link, idx) => (
                                        <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="bg-white p-6 rounded-[2rem] shadow-md border-2 border-transparent hover:border-[#f59e0b] transition-all group flex items-center justify-between h-32">
                                            <div className="flex items-center gap-5">
                                                <div className="bg-slate-50 p-5 rounded-2xl text-slate-400 group-hover:bg-[#f59e0b] group-hover:text-[#2d3e50] transition-all shadow-inner">{link.icon}</div>
                                                <div>
                                                    <h3 className="text-slate-800 font-black uppercase italic tracking-tighter text-lg leading-none mb-1">{link.title}</h3>
                                                    <p className="text-slate-500 text-[10px] font-bold uppercase leading-none opacity-60">{link.desc}</p>
                                                </div>
                                            </div>
                                            <IconArrowRight />
                                        </a>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'especialista' && (
                            <div className="animate-fadeIn flex justify-center w-full">
                                {!isEspecialistaAuthed ? (
                                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-200 w-full max-w-sm text-center">
                                        <div className="mb-8 flex justify-center"><div className="bg-slate-50 p-10 rounded-full text-[#f59e0b] shadow-inner"><IconShield /></div></div>
                                        <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter mb-10 leading-none">Acesso Especialista</h2>
                                        <input type="password" maxLength="4" value={pinInput} onChange={(e) => { setPinInput(e.target.value); if(e.target.value === '7711') setIsEspecialistaAuthed(true); }} placeholder="PIN" className="w-full text-center text-5xl p-6 bg-slate-50 border-2 rounded-2xl outline-none border-slate-200 focus:border-[#f59e0b] tracking-[0.4em] font-black" autoFocus />
                                    </div>
                                ) : (
                                    <div className="w-full space-y-10 animate-fadeIn">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-emerald-500 p-3 rounded-2xl text-white shadow-lg"><IconShield /></div>
                                            <h2 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter leading-none tracking-tighter">Credenciais do Setor</h2>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
                                            {credenciais.map((c, i) => (
                                                <div key={i} className="bg-white p-10 rounded-[2.5rem] shadow-xl border-t-[10px] border-[#f59e0b] flex flex-col gap-6">
                                                    <h3 className="text-slate-800 font-black uppercase italic tracking-tighter text-2xl mb-2">{c.portal}</h3>
                                                    <div className="space-y-5">
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-2 leading-none">Email / Utilizador</p>
                                                            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                                                                <span className="font-bold text-slate-600 truncate mr-4">{c.user}</span>
                                                                <button onClick={() => copyToClipboard(c.user, `u_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`u_${i}`] ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <p className="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-2 leading-none">Password</p>
                                                            <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
                                                                <span className="font-mono font-bold text-slate-600">••••••••</span>
                                                                <button onClick={() => copyToClipboard(c.pass, `p_${i}`)} className={`p-3 rounded-xl transition-all ${copyStatus[`p_${i}`] ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}><IconClipboard /></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* --- TELINHA DE SOLUÇÃO (MODAL DE DETALHES) --- */}
                    {selectedError && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4 animate-fadeIn" onClick={() => setSelectedError(null)}>
                            <div className="bg-white rounded-[2.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] w-full max-w-2xl p-8 md:p-14 relative animate-modalIn" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedError(null)} className="absolute top-6 right-6 p-2 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><IconX /></button>
                                <div className="mb-8">
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="w-2 h-2 rounded-full bg-[#f59e0b]"></div>
                                        <span className="text-[#f59e0b] font-black uppercase text-[10px] tracking-[0.3em] leading-none">Conhecimento Mapeado</span>
                                    </div>
                                    <h2 className="text-2xl md:text-3xl font-black text-[#2d3e50] uppercase italic tracking-tighter leading-tight select-text">{selectedError.erro}</h2>
                                </div>
                                <div className="bg-slate-50 rounded-[2rem] p-6 md:p-8 border border-slate-100 mb-8 max-h-[40vh] overflow-y-auto custom-scrollbar">
                                    <p className="text-slate-700 whitespace-pre-wrap font-bold text-lg md:text-xl leading-relaxed select-text">{selectedError.solucao}</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <button onClick={() => openEditModal(selectedError)} className="py-5 px-8 rounded-2xl bg-white border-2 border-slate-200 text-slate-400 hover:text-[#f59e0b] hover:border-[#f59e0b] transition-all shadow-sm"><IconEdit /></button>
                                    <button onClick={() => copyToClipboard(selectedError.solucao, `modal_${selectedError.id}`)} className={`flex-1 py-5 rounded-2xl text-xs font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 shadow-xl ${copyStatus[`modal_${selectedError.id}`] ? 'bg-emerald-500 text-white' : 'bg-[#2d3e50] text-white hover:bg-slate-800'}`}>
                                        <IconClipboard width="18" height="18" />
                                        {copyStatus[`modal_${selectedError.id}`] ? "COPIADO!" : "COPIAR SOLUÇÃO"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL DE EDIÇÃO --- */}
                    {editingError && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-xl animate-fadeIn">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden animate-modalIn" onClick={e => e.stopPropagation()}>
                                <div className="bg-[#2d3e50] p-8 border-b-4 border-[#f59e0b] flex justify-between items-center text-white">
                                    <h3 className="text-xl font-black italic uppercase tracking-tighter leading-none">Editar Mapeamento</h3>
                                    <button onClick={() => setEditingError(null)} className="p-2 hover:bg-white/10 rounded-full transition-colors"><IconX /></button>
                                </div>
                                <form onSubmit={handleUpdateError} className="p-10 space-y-6 bg-slate-50">
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest leading-none">Título / Erro</label>
                                        <textarea required rows="3" value={editErrorInput} onChange={(e) => setEditErrorInput(e.target.value)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-[1.5rem] outline-none focus:border-[#f59e0b] font-bold text-slate-700 shadow-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest leading-none">Instruções Técnicas</label>
                                        <textarea required rows="8" value={editSolutionInput} onChange={(e) => setEditSolutionInput(e.target.value)} className="w-full p-5 bg-white border-2 border-slate-100 rounded-[1.5rem] outline-none focus:border-[#f59e0b] font-bold text-slate-700 shadow-sm" />
                                    </div>
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setEditingError(null)} className="flex-1 py-5 bg-slate-200 text-slate-600 font-black rounded-2xl uppercase text-xs tracking-widest transition-colors hover:bg-slate-300">Descartar</button>
                                        <button type="submit" className="flex-[2] py-5 bg-[#f59e0b] text-[#2d3e50] font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl active:scale-[0.98] transition-all">
                                            {saveStatus === 'loading' ? 'A SALVAR...' : 'SALVAR ALTERAÇÕES'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="text-center p-8 text-slate-400 text-[10px] font-black uppercase italic tracking-widest leading-none tracking-tighter opacity-50">
                        Softcom Tecnologia &copy; {new Date().getFullYear()} • Suporte NFSe Cloud
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
